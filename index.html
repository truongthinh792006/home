    // --- BỘ TRỢ GIÚP TOÀN CỤC CHỐNG LỖI KHỞI TẠO TDZ ---
    const isGooglePhotosPageUrl = (url) => {
      if (!url) return false;
      return url.includes('photos.google.com/share') || url.includes('photos.app.goo.gl') || url.includes('photos.google.com/photo');
    };

    const isFifeUrl = (url) => {
      if (!url) return false;
      return url.includes('fife.usercontent.google.com');
    };

    const decodeGooglePhotosHtml = (html) => {
      if (!html) return '';
      try {
        let decoded = html.replace(/\\u([0-9a-fA-F]{4})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\x([0-9a-fA-F]{2})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\([\/])/g, '$1');
        decoded = decoded.replace(/\\"/g, '"');
        return decoded;
      } catch (e) {
        return html;
      }
    };

    const isActualGooglePhoto = (url) => {
      if (!url) return false;
      const lowerUrl = url.toLowerCase();
      const isGoogle = lowerUrl.includes('googleusercontent.com') || lowerUrl.includes('usercontent.google');
      if (!isGoogle) return true;

      const hasPhotoPattern = lowerUrl.includes('/pw/') || lowerUrl.includes('/p/') || lowerUrl.includes('/lr/');
      const isAvatar = lowerUrl.includes('/a/') || lowerUrl.includes('/a-/') || lowerUrl.includes('/profile/') || lowerUrl.includes('/contacts/');

      return hasPhotoPattern && !isAvatar;
    };

    // Hàm phân tích ngày cực kỳ an toàn tương thích 100% với Safari, iOS, Android và mọi trình duyệt di động
    const parseAnniversaryDate = (dateStr) => {
      if (!dateStr) return new Date();
      const normalized = dateStr.replace(/-/g, '/');
      const parsed = new Date(normalized);
      if (!isNaN(parsed.getTime())) return parsed;
      
      const fallback = new Date(dateStr);
      if (!isNaN(fallback.getTime())) return fallback;
      
      const parts = dateStr.split(/[-/]/);
      if (parts.length === 3) {
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1; 
        const day = parseInt(parts[2], 10);
        const manualDate = new Date(year, month, day);
        if (!isNaN(manualDate.getTime())) return manualDate;
      }
      return new Date(); 
    };

    const renderAvatar = (member, sizeClasses = "w-24 h-24 text-2xl") => {
      const initials = member.name ? member.name.trim().split(' ').pop()[0].toUpperCase() : '?';

      return (

              alt={member.name}
              className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"

            />

            {initials}
          </div>
        </div>
      );
    };

      const processedWorkbenchPhotos = photos

          const matchesSearch = 
            photo.id.toLowerCase().includes(tableSearch.toLowerCase()) ||
            photo.caption.toLowerCase().includes(tableSearch.toLowerCase()) ||
            photo.date.includes(tableSearch);
          
          const matchesIdFilter = photo.id.toLowerCase().includes(colFilters.id.toLowerCase());
          const matchesAppFilter = (albums.find(a => a.id === photo.albumId)?.name || '').toLowerCase().includes(colFilters.app.toLowerCase());
          const matchesCaptionFilter = photo.caption.toLowerCase().includes(colFilters.task.toLowerCase());
          const matchesDateFilter = photo.date.includes(colFilters.due);

          return matchesSearch && matchesIdFilter && matchesAppFilter && matchesCaptionFilter && matchesDateFilter;
        })
        .sort((a, b) => {
          let fieldA = a[sortField] || '';
          let fieldB = b[sortField] || '';

          if (sortField === 'app') {
            fieldA = albums.find(al => al.id === a.albumId)?.name || '';
            fieldB = albums.find(al => al.id === b.albumId)?.name || '';
          }

          if (fieldA < fieldB) return sortAsc ? -1 : 1;
          if (fieldA > fieldB) return sortAsc ? 1 : -1;
          return 0;
        });

            const parsed = JSON.parse(event.target.result);

        showToast("Đã xóa mốc thời gian kỷ niệm.");
      };

      // --- CHỌN ẢNH ĐẠI DIỆN / BÌA ALBUM TỪ ALBUM CỦA CHÍNH MÌNH ---
      const handleSelectAvatarFromAlbum = (photoUrl) => {
        if (activeAvatarSelectorMemberId) {
          let avatarUrl = photoUrl;
          if (photoUrl.includes('googleusercontent.com') || photoUrl.includes('usercontent.google.com')) {
            const cleanUrl = photoUrl.split('=')[0];
            avatarUrl = `${cleanUrl}=w150-h150-c`;
          }
          handleUpdateMember(activeAvatarSelectorMemberId, 'avatar', avatarUrl);
          setActiveAvatarSelectorMemberId(null);
          showToast("Đã thiết lập ảnh đại diện thành viên.");
        }
      };

      const handleSelectCoverFromAlbum = (photoUrl) => {
        if (activeCoverSelectorAlbumId) {
          let coverUrl = photoUrl;
          if (photoUrl.includes('googleusercontent.com') || photoUrl.includes('usercontent.google.com')) {
            const cleanUrl = photoUrl.split('=')[0];
            coverUrl = `${cleanUrl}=w600-h800-c`;
          }
          handleUpdateAlbum(activeCoverSelectorAlbumId, 'cover', coverUrl);
          setActiveCoverSelectorAlbumId(null);
          showToast("Đã thiết lập ảnh bìa album mới.");
        }
      };

      // --- TRÍCH XUẤT ẢNH ĐƠN LÈ TỪ MÃ NGUỒN HTML DÁN TRỰC TIẾP ---
      const handleExtractSingleFromHtml = () => {
        if (!singleHtmlInput.trim() || !htmlExtractorTarget) return;
        try {
          const cleanHtml = decodeGooglePhotosHtml(singleHtmlInput);
          const regex = /(https:\/\/[a-zA-Z0-9.-]*googleusercontent\.com\/[a-zA-Z0-9\-_/]{30,})/g;
          const foundUrls = new Set();
          let match;
          
          while ((match = regex.exec(cleanHtml)) !== null) {
            const imageUrl = match[1];
            if (isActualGooglePhoto(imageUrl)) {
              foundUrls.add(imageUrl.split('=')[0]);
            }
          }

          const uniqueUrls = Array.from(foundUrls);

          if (uniqueUrls.length === 0) {
            showToast("Không bóc tách được tệp ảnh nào từ đoạn HTML vừa dán. Bạn hãy copy đúng mã nguồn ảnh đơn.", "error");
            return;
          }

          const targetUrl = uniqueUrls[0]; 

          if (htmlExtractorTarget.type === 'member') {
            handleUpdateMember(htmlExtractorTarget.id, 'avatar', `${targetUrl}=w150-h150-c`);
          } else if (htmlExtractorTarget.type === 'photo') {
            handleUpdatePhoto(htmlExtractorTarget.id, 'url', `${targetUrl}=w1000`);
          } else if (htmlExtractorTarget.type === 'album') {
            handleUpdateAlbum(htmlExtractorTarget.id, 'cover', `${targetUrl}=w600-h800-c`);
          }

          showToast("🎉 Đã bóc tách và gán liên kết ảnh trực tiếp vĩnh viễn thành công!");
          setSingleHtmlInput('');
          setHtmlExtractorTarget(null);
        } catch (err) {
          showToast("Gặp sự cố khi xử lý mã nguồn HTML dán vào.", "error");
        }
      };

      // --- BỘ TRÍCH XUẤT ẢNH TỪ TRANG CHIA SẺ GOOGLE PHOTOS CÔNG KHAI (DÙNG CHUNG) ---
      const handleExtractImageFromGPhotos = async (url, onSuccess, onError) => {
        if (!url || !url.trim()) return;
        
        const proxyList = [
          {
            name: 'CorsProxy.io',
            getUrl: (target) => `https://corsproxy.io/?${encodeURIComponent(target)}`,
            parse: async (res) => await res.text()
          },
          {
            name: 'AllOrigins JSON',
            getUrl: (target) => `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
            parse: async (res) => {
              const json = await res.json();
              return json.contents;
            }
          }
        ];

        let html = null;
        let selectedProxyName = '';

        for (const proxy of proxyList) {
          try {
            const response = await fetch(proxy.getUrl(url.trim()));
            if (response.ok) {
              html = await proxy.parse(response);
              if (html && html.length > 500) {
                selectedProxyName = proxy.name;
                break;
              }
            }
          } catch (err) {
            console.warn(`Proxy ${proxy.name} failed`, err);
          }
        }

        if (!html) {
          onError("Không thể kết nối đến máy chủ Google hoặc các cổng Proxy hiện tại đang bận. Hãy dán trực tiếp liên kết ảnh gốc.");
          return;
        }

        try {
          const decodedHtml = decodeGooglePhotosHtml(html);
          const regex = /(https:\/\/[a-zA-Z0-9.-]*googleusercontent\.com\/[a-zA-Z0-9\-_/]{30,})/g;
          const found = [];
          let match;
          while ((match = regex.exec(decodedHtml)) !== null) {
            const imageUrl = match[1];
            if (isActualGooglePhoto(imageUrl)) {
              found.push(imageUrl.split('=')[0]);
            }
          }

          if (found.length > 0) {
            onSuccess(found[0]);
          } else {
            throw new Error();
          }
        } catch (err) {
          onError("Không bóc tách được hình ảnh từ liên kết trang Album Google Photos này. Hãy đảm bảo Album của bạn đang mở chế độ chia sẻ công khai.");
        }
      };

      const handleExtractAvatarFromLink = (memberId, url) => {
        setIsExtractingAvatar(memberId);
        handleExtractImageFromGPhotos(url,
          (directUrl) => {
            handleUpdateMember(memberId, 'avatar', `${directUrl}=w150-h150-c`);
            setIsExtractingAvatar(null);
            showToast("🎉 Đã trích xuất ảnh đại diện từ Google Photos thành công!");
          },
          (errMsg) => {
            showToast(errMsg, "error");
            setIsExtractingAvatar(null);
          }
        );
      };

      const handleExtractPhotoFromLink = (photoId, url) => {
        setIsExtractingPhotoId(photoId);
        handleExtractImageFromGPhotos(url,
          (directUrl) => {
            handleUpdatePhoto(photoId, 'url', `${directUrl}=w1000`);
            setIsExtractingPhotoId(null);
            showToast("🎉 Đã chuyển đổi sang liên kết ảnh trực tiếp của Google thành công!");
          },
          (errMsg) => {
            showToast(errMsg, "error");
            setIsExtractingPhotoId(null);
          }
        );
      };

      const handleImportFromPastedHtml = (targetType, existingId, newName) => {
        if (!pastedHtmlSource.trim()) return;
        setIsScraping(true);
        setScrapeError(null);
        setScrapeSuccess('');
        setCurrentProxyStatus('Đang phân tích cú pháp mã nguồn HTML...');

        try {
          const cleanHtml = decodeGooglePhotosHtml(pastedHtmlSource);
          const regex = /(https:\/\/[a-zA-Z0-9.-]*googleusercontent\.com\/[a-zA-Z0-9\-_/]{30,})/g;
          const foundUrls = new Set();
          let match;
          
          while ((match = regex.exec(cleanHtml)) !== null) {
            const imageUrl = match[1];
            if (isActualGooglePhoto(imageUrl)) {
              foundUrls.add(imageUrl.split('=')[0]);
            }
          }

          const uniqueUrls = Array.from(foundUrls);

          if (uniqueUrls.length === 0) {
            throw new Error('Không bóc tách được tệp ảnh nào từ mã nguồn HTML vừa dán. Bạn hãy copy đầy đủ.');
          }

          let finalAlbumId = existingId;

          if (targetType === 'new') {
            const resolvedName = newName.trim() || `Album mới (${new Date().toLocaleDateString('vi-VN')})`;
            const newAlbumId = 'album_' + Date.now().toString();
            const firstImgCover = `${uniqueUrls[0]}=w600`;
            
            const newAlbum = {
              id: newAlbumId,
              name: resolvedName,
              desc: `Bộ sưu tập gồm ${uniqueUrls.length} ảnh tự động đồng bộ từ Google Photos.`,
              cover: firstImgCover
            };

            const updatedAlbums = [...albums, newAlbum];
            setAlbums(updatedAlbums);
            localStorage.setItem('family_albums', JSON.stringify(updatedAlbums));
            finalAlbumId = newAlbumId;
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = uniqueUrls.map((rawUrl, i) => {
            return {
              id: `gphotos_${Date.now()}_${i}`,
              url: `${rawUrl}=w1000`,
              caption: `Kỷ niệm tự động quét #${i + 1}`,
              date: todayString,
              albumId: finalAlbumId
            };
          });

          const combined = [...newPhotos, ...photos];
          setPhotos(combined);
          localStorage.setItem('family_photos', JSON.stringify(combined));
          showToast("🎉 Thành công! Đồng bộ hoàn tất. Đã thêm " + newPhotos.length + " bức ảnh vào album của bạn.");
          setInputAlbumUrl('');
          setImportNewAlbumName('');
          setActiveAlbumId(finalAlbumId); // Tự động mở xem album mới đồng bộ luôn
          setShowSettings(false); // Tắt bảng cài đặt để xem kết quả
        } catch (err) {
          setScrapeError(err.message || 'Lỗi bóc tách tệp Album.');
        } finally {
          setIsScraping(false);
          setCurrentProxyStatus('');
        }
      };

      const handleImportAlbum = async (url, targetAlbumId) => {
        if (!url.trim()) return;
        setIsScraping(true);
        setScrapeError(null);
        setScrapeSuccess('');
        setCurrentProxyStatus('Đang thiết lập kết nối...');

        const proxyList = [
          {
            name: 'CorsProxy.io',
            getUrl: (target) => `https://corsproxy.io/?${encodeURIComponent(target)}`,

          },
          {
            name: 'AllOrigins JSON',
            getUrl: (target) => `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
            parse: async (res) => {
              const json = await res.json();
              return json.contents;
            }
          },
          {
            name: 'CodeTabs Proxy',
            getUrl: (target) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`,
            parse: async (res) => await res.text()

        ];

        let htmlContents = null;
        let selectedProxyName = '';

        for (let i = 0; i < proxyList.length; i++) {
          const proxy = proxyList[i];
          try {
            setCurrentProxyStatus(`Đang bóc tách qua máy chủ dự phòng ${proxy.name}...`);
            const response = await fetch(proxy.getUrl(url.trim()));
            if (response.ok) {
              htmlContents = await proxy.parse(response);
              if (htmlContents && htmlContents.length > 500) {
                selectedProxyName = proxy.name;
                break;
              }
            }
          } catch (err) {
            console.warn(`Proxy ${proxy.name} failed`, err);
          }
        }

        if (!htmlContents) {
          setIsScraping(false);
          setScrapeError(`Cổng đồng bộ trực tuyến tạm thời quá tải. Bạn hãy dán trực tiếp danh sách link ảnh hoặc sử dụng tính năng dán trực tiếp mã nguồn HTML ở tab bên cạnh.`);
          return;
        }

        try {
          setCurrentProxyStatus('Đang bóc tách dữ liệu tệp tin ảnh từ Google Photos...');
          const cleanHtml = decodeGooglePhotosHtml(htmlContents);
          const regex = /(https:\/\/[a-zA-Z0-9.-]*googleusercontent\.com\/[a-zA-Z0-9\-_/]{30,})/g;
          const foundUrls = new Set();
          let match;
          
          while ((match = regex.exec(cleanHtml)) !== null) {
            const imageUrl = match[1];
            if (isActualGooglePhoto(imageUrl)) {
              foundUrls.add(imageUrl.split('=')[0]);
            }
          }

          const uniqueUrls = Array.from(foundUrls);

          if (uniqueUrls.length === 0) {
            throw new Error('Không lấy được dữ liệu ảnh. Hãy dán link album dài (bắt đầu bằng https://photos.google.com/share/...) hoặc sử dụng tính năng dán trực tiếp danh sách link ảnh hoặc mã nguồn HTML ở các ngăn bên dưới.');
          }

          let finalAlbumId = targetAlbumId;

          if (importTargetType === 'new') {
            const resolvedName = importNewAlbumName.trim() || `Album mới (${new Date().toLocaleDateString('vi-VN')})`;
            const newAlbumId = 'album_' + Date.now().toString();
            const firstImgCover = `${uniqueUrls[0]}=w600`;
            
            const newAlbum = {
              id: newAlbumId,
              name: resolvedName,
              desc: `Bộ sưu tập gồm ${uniqueUrls.length} ảnh tự động đồng bộ từ Google Photos.`,
              cover: firstImgCover
            };

            const updatedAlbums = [...albums, newAlbum];
            setAlbums(updatedAlbums);
            localStorage.setItem('family_albums', JSON.stringify(updatedAlbums));
            finalAlbumId = newAlbumId;
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = uniqueUrls.map((rawUrl, i) => {
            return {
              id: `gphotos_${Date.now()}_${i}`,
              url: `${rawUrl}=w1000`,
              caption: `Kỷ niệm tự động quét #${i + 1}`,
              date: todayString,
              albumId: finalAlbumId
            };
          });

          const combined = [...newPhotos, ...photos];
          setPhotos(combined);
          localStorage.setItem('family_photos', JSON.stringify(combined));
          showToast(`🎉 Thành công! Đồng bộ hoàn tất. Đã thêm ${newPhotos.length} bức ảnh vào album của bạn.`);
          setInputAlbumUrl('');
          setImportNewAlbumName('');
          setActiveAlbumId(finalAlbumId); // Tự động mở xem album mới đồng bộ luôn
          setShowSettings(false); // Tắt bảng cài đặt để xem kết quả
        } catch (err) {
          setScrapeError(err.message || 'Lỗi bóc tách tệp Album.');
        } finally {
          setIsScraping(false);
          setCurrentProxyStatus('');
        }
      };

      const handleImportDirectLinks = (targetType, existingId, newName) => {
        if (!inputDirectUrls.trim()) return;
        setIsScraping(true);
        setScrapeError(null);
        setScrapeSuccess('');

        try {
          const lines = inputDirectUrls.split('\n');
          const validUrls = lines
            .map(line => line.trim())
            .filter(line => line.startsWith('http://') || line.startsWith('https://'));

          if (validUrls.length === 0) {
            throw new Error('Không tìm thấy đường dẫn liên kết ảnh hợp lệ nào (bắt đầu bằng http:// hoặc https://)');
          }

          let finalAlbumId = existingId;

          if (targetType === 'new') {
            const resolvedName = newName.trim() || `Album mới (${new Date().toLocaleDateString('vi-VN')})`;
            const newAlbumId = 'album_' + Date.now().toString();
            const firstImgCover = validUrls[0];
            
            const newAlbum = {
              id: newAlbumId,
              name: resolvedName,
              desc: `Bộ sưu tập gồm ${validUrls.length} ảnh tự động thêm từ danh sách link.`,
              cover: firstImgCover
            };

            const updatedAlbums = [...albums, newAlbum];
            setAlbums(updatedAlbums);
            localStorage.setItem('family_albums', JSON.stringify(updatedAlbums));
            finalAlbumId = newAlbumId;
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = validUrls.map((rawUrl, i) => {
            return {
              id: `direct_${Date.now()}_${i}`,
              url: rawUrl,
              caption: `Kỷ niệm nạp thủ công #${i + 1}`,
              date: todayString,
              albumId: finalAlbumId
            };
          });

          const combined = [...newPhotos, ...photos];
          setPhotos(combined);
          localStorage.setItem('family_photos', JSON.stringify(combined));
          showToast("🎉 Thành công! Đã thêm " + newPhotos.length + " bức ảnh vào album của bạn.");
          setInputDirectUrls('');
          setImportNewAlbumName('');
          setActiveAlbumId(finalAlbumId); 
          setShowSettings(false); 
        } catch (err) {
          setScrapeError(err.message || 'Lỗi xử lý danh sách ảnh.');
        } finally {
          setIsScraping(false);
        }
      };

      // --- ĐỒNG BỘ NGƯỢC LẠI TỪ TỆP GITHUB GỐC ---
      const handleRestoreFromGithubDefaults = () => {
        setConfirmDialog({
          text: "Hành động này sẽ xóa toàn bộ các cài đặt tạm thời trên máy bạn và khôi phục lại cấu hình mặc định từ file index.html. Bạn có đồng ý?",
          onConfirm: () => {
            localStorage.clear();
            window.location.reload();
          }
        });
      };

      // --- TỔNG HỢP CẤU HÌNH BIÊN DỊCH GITHUB DẠNG CHUỖI ---
      const getGeneratedConfigString = () => {
        const currentSettings = {
          albumTitle,
          albumSubtitle,
          musicUrl,
          anniversaryDate,
          adminPin
        };
        return `    // =========================================================================
    // ⚠️ PHẦN KHỞI TẠO DỮ LIỆU GỐC (DÀNH CHO KHÁCH TRUY CẬP LẦN ĐẦU)
    // =========================================================================
    const CODE_VERSION = "${CODE_VERSION}";

    const INITIAL_SETTINGS = ${JSON.stringify(currentSettings, null, 6)};

    const INITIAL_MEMBERS = ${JSON.stringify(members, null, 6)};

    const INITIAL_ALBUMS = ${JSON.stringify(albums, null, 6)};

    const INITIAL_PHOTOS = ${JSON.stringify(photos, null, 6)};

    const INITIAL_TIMELINE = ${JSON.stringify(timeline, null, 6)};
    // =========================================================================`;
      };

      // --- BẢN NÂNG CẤP ĐỒNG BỘ GITHUB 1-CLICK ---
      const handleCopyConfigToClipboard = () => {
        const configText = getGeneratedConfigString();
        const textarea = document.createElement('textarea');
        textarea.value = configText;
        textarea.style.position = 'fixed'; 
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          const success = document.execCommand('copy');
          if (success) {
            showToast('📋 Đã sao chép mã cấu hình mới! Hãy dán đè vào index.html trên GitHub.');
          } else {
            throw new Error();
          }
        } catch (e) {
          showToast('Trình duyệt chặn sao chép tự động. Hãy bôi đen copy ở ô xem trước phía dưới.', 'error');
        }
        document.body.removeChild(textarea);
      };

      return (
        <div className="min-h-screen text-slate-800 font-sans selection:bg-rose-100 selection:text-rose-700 bg-[#faf6f0]">
          
          <audio ref={audioRef} src={musicUrl} />

          {/* --- HEADER --- */}
          <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-orange-100 transition-all duration-300">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <span className="text-rose-500 animate-pulse">
                  <HeartIcon className="w-7 h-7" />
                </span>

              </div>

              <div className="flex items-center space-x-4">

                >

                </button>

                {isAdminAuthenticated && (

                      setIsAdminAuthenticated(false);
                      showToast("🔒 Đã đăng xuất khỏi chế độ Quản trị viên!");

                    className="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-full text-xs font-bold transition-all border border-rose-200 flex items-center space-x-1"

          {/* --- HERO BANNER & BỘ ĐẾM NGÀY --- */}

            <div className="max-w-4xl mx-auto text-center px-4 relative z-10">

                  >
                    🚀 Trích xuất ảnh
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- HỘP THOẠI THÔNG BÁO TOAST --- */}
          {notification && (
            <div className="fixed bottom-4 right-4 z-50 bg-slate-900/95 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 transition-all duration-300 animate-slide-in font-sans">
              <span className="text-lg">{notification.type === 'error' ? '⚠️' : '🎉'}</span>
              <span className="text-xs md:text-sm font-semibold tracking-wide">{notification.text}</span>
              <button onClick={() => setNotification(null)} className="text-white/50 hover:text-white font-bold text-sm ml-2">×</button>
            </div>
          )}

          {/* --- HỘP THOẠI XÁC NHẬN TÙY CHỈNH --- */}
          {confirmDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-xs p-4 font-sans">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-amber-100 text-center space-y-4">
                <div className="w-12 h-12 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center mx-auto text-xl">
                  ❓
                </div>
                <div>
                  <h3 className="text-lg font-bold text-amber-955 font-serif">Xác Nhận Hành Động</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed font-sans">{confirmDialog.text}</p>
                </div>
                <div className="flex space-x-2 pt-2 font-sans">
                  <button 
                    onClick={() => setConfirmDialog(null)}
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all"
                  >
                    Hủy bỏ
                  </button>
                  <button 
                    onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }}
                    className="flex-1 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-amber-800/10"
                  >
                    Đồng ý
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
