      { id: '6', url: 'https://images.unsplash.com/photo-1472289065668-ce650ac443d2?w=1000&auto=format&fit=crop&q=80', caption: 'Ba mẹ và các con tíu tít trang trí cành đào đón Tết', date: '2026-02-14', albumId: 'tet' }

      { id: '4', year: '2018', title: 'Ngôi nhà mới, khởi đầu mới', desc: 'Cả nhà cùng chuyển về tổ ấm tự tay thiết kế, bắt đầu viết tiếp những chương hạnh phúc.' }

    const HeartIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" className={className}>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    );

    const SettingsIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const decodeGooglePhotosHtml = (html) => {
      if (!html) return '';
      try {
        let decoded = html.replace(/\\u([0-9a-fA-F]{4})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\x([0-9a-fA-F]{2})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\([\/])/g, '$1');
        decoded = decoded.replace(/\\"/g, '"');
        return decoded;
      } catch (e) {
        return html;
      }
    };

    const isActualGooglePhoto = (url) => {
      if (!url) return false;
      const lowerUrl = url.toLowerCase();
      const isGoogle = lowerUrl.includes('googleusercontent.com') || lowerUrl.includes('usercontent.google');
      if (!isGoogle) return true;
      const hasPhotoPattern = lowerUrl.includes('/pw/') || lowerUrl.includes('/p/') || lowerUrl.includes('/lr/');
      const isAvatar = lowerUrl.includes('/a/') || lowerUrl.includes('/a-/') || lowerUrl.includes('/profile/') || lowerUrl.includes('/contacts/');
      return hasPhotoPattern && !isAvatar;
    };

    function App() {
      // --- KẾT NỐI FIRESTORE & XÁC THỰC ---
      const [isAuthed, setIsAuthed] = useState(false);
      const [appId] = useState(() => typeof __app_id !== 'undefined' ? __app_id : 'default-family-album');
      const [db] = useState(() => window.FirebaseSDK.db);
      const [auth] = useState(() => window.FirebaseSDK.auth);

      // --- TRẠNG THÁI HIỂN THỊ CHÍNH (ĐỒNG BỘ ĐÁM MÂY) ---
      const [albumTitle, setAlbumTitle] = useState(INITIAL_SETTINGS.albumTitle);
      const [albumSubtitle, setAlbumSubtitle] = useState(INITIAL_SETTINGS.albumSubtitle);
      const [musicUrl, setMusicUrl] = useState(INITIAL_SETTINGS.musicUrl);
      const [anniversaryDate, setAnniversaryDate] = useState(INITIAL_SETTINGS.anniversaryDate);
      const [adminPin, setAdminPin] = useState(INITIAL_SETTINGS.adminPin);
      const [footerText, setFooterText] = useState(INITIAL_SETTINGS.footerText);
      
      const [albums, setAlbums] = useState([]);
      const [members, setMembers] = useState([]);
      const [photos, setPhotos] = useState([]);
      const [timeline, setTimeline] = useState([]);

      // --- TRẠNG THÁI KHÁC ---
      const [isLoading, setIsLoading] = useState(true);
      const [activePhotoIndex, setActivePhotoIndex] = useState(null); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [daysTogether, setDaysTogether] = useState(0);
      const [activeAlbumId, setActiveAlbumId] = useState(null);
      const [viewMode, setViewMode] = useState('album');

      // --- TRÌNH CHIẾU TỰ ĐỘNG VÀ VUỐT CHẠM ---
      const [isSlideshowActive, setIsSlideshowActive] = useState(false);
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      // --- BIẾN PHỤ TẠM THỜI CHO KHUNG ĐIỀU KHIỂN ---
      const [tempTitle, setTempAlbumTitle] = useState('');
      const [tempSubtitle, setTempAlbumSubtitle] = useState('');
      const [tempAnniversaryDate, setTempAnniversaryDate] = useState('');
      const [tempMusicUrl, setTempMusicUrl] = useState('');
      const [tempAdminPin, setTempAdminPin] = useState('');
      const [tempFooterText, setTempFooterText] = useState('');

      // --- LỰA CHỌN PHỤ TRONG KHO ---
      const [activeAvatarSelectorMemberId, setActiveAvatarSelectorMemberId] = useState(null);
      const [activeCoverSelectorAlbumId, setActiveCoverSelectorAlbumId] = useState(null);
      const [htmlExtractorTarget, setHtmlExtractorTarget] = useState(null); 
      const [singleHtmlInput, setSingleHtmlInput] = useState('');

      // --- BẢO MẬT & ĐỒNG BỘ GOOGLE PHOTOS ---
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinInput, setPinInput] = useState('');
      const [pinError, setPinError] = useState('');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);

      const [inputAlbumUrl, setInputAlbumUrl] = useState('');
      const [inputDirectUrls, setInputDirectUrls] = useState(''); 
      const [importTargetType, setImportTargetType] = useState('existing'); 
      const [importAlbumId, setImportAlbumId] = useState('');
      const [importNewAlbumName, setImportNewAlbumName] = useState('');
      const [isScraping, setIsScraping] = useState(false);
      const [scrapeError, setScrapeError] = useState(null);
      const [scrapeSuccess, setScrapeSuccess] = useState('');
      const [gPhotosSyncTab, setGPhotosSyncTab] = useState('auto'); 
      const [pastedHtmlSource, setPastedHtmlSource] = useState(''); 
      const [activeTab, setActiveTab] = useState('general'); 
      
      const audioRef = useRef(null);

      // --- HỘP THOẠI NỘI BỘ THAY THẾ ALERT & CONFIRM ---
      const [customAlert, setCustomAlert] = useState({ show: false, message: "" });
      const [customConfirm, setCustomConfirm] = useState({ show: false, message: "", onConfirm: null });

      const showCustomAlert = (msg) => {
        setCustomAlert({ show: true, message: msg });
      };

      const showCustomConfirm = (msg, action) => {
        setCustomConfirm({ show: true, message: msg, onConfirm: action });
      };

      const activeAlbum = albums.find(a => a.id === activeAlbumId);
      const filteredPhotos = viewMode === 'all' 
        ? photos 
        : (activeAlbumId ? photos.filter(p => p.albumId === activeAlbumId) : photos);

      useEffect(() => {
        const performAuth = async () => {
          try {
            let cred;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              cred = await window.FirebaseSDK.signInWithCustomToken(auth, __initial_auth_token);
            } else {
              cred = await window.FirebaseSDK.signInAnonymously(auth);
            }
            if (cred.user) {
              setIsAuthed(true);
            }
          } catch (error) {
            console.error("Lỗi xác thực Firebase:", error);
            // Vẫn cho phép hiển thị nếu Firebase bị chặn hoặc lỗi mạng
            setIsLoading(false);
          }
        };
        performAuth();
      }, []);

      useEffect(() => {
        if (!isAuthed) return;

        // 1. Đồng bộ cấu hình chung (Settings)
        const settingsRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
        const unsubscribeSettings = window.FirebaseSDK.onSnapshot(settingsRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setAlbumTitle(data.albumTitle || INITIAL_SETTINGS.albumTitle);
            setAlbumSubtitle(data.albumSubtitle || INITIAL_SETTINGS.albumSubtitle);
            setMusicUrl(data.musicUrl || INITIAL_SETTINGS.musicUrl);
            setAnniversaryDate(data.anniversaryDate || INITIAL_SETTINGS.anniversaryDate);
            setAdminPin(data.adminPin || INITIAL_SETTINGS.adminPin);
            setFooterText(data.footerText || INITIAL_SETTINGS.footerText);

            // Cập nhật giá trị hiển thị tạm thời
            setTempAlbumTitle(data.albumTitle || INITIAL_SETTINGS.albumTitle);
            setTempAlbumSubtitle(data.albumSubtitle || INITIAL_SETTINGS.albumSubtitle);
            setTempAnniversaryDate(data.anniversaryDate || INITIAL_SETTINGS.anniversaryDate);
            setTempMusicUrl(data.musicUrl || INITIAL_SETTINGS.musicUrl);
            setTempAdminPin(data.adminPin || INITIAL_SETTINGS.adminPin);
            setTempFooterText(data.footerText || INITIAL_SETTINGS.footerText);
          } else {
            // Nếu chưa có dữ liệu đám mây, tiến hành khởi tạo dữ liệu mẫu gốc
            initializeDefaultFirestoreData();
          }
        }, (err) => {
          console.error("Lỗi đồng bộ Settings:", err);
        });

        // 2. Đồng bộ danh sách thành viên (Members)
        const membersRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubscribeMembers = window.FirebaseSDK.onSnapshot(membersRef, (snap) => {
          const list = [];
          snap.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          setMembers(list);
        }, (err) => {
          console.error("Lỗi đồng bộ Members:", err);
        });

        // 3. Đồng bộ danh sách quyển Album (Albums)
        const albumsRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'albums');
        const unsubscribeAlbums = window.FirebaseSDK.onSnapshot(albumsRef, (snap) => {
          const list = [];
          snap.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          setAlbums(list);
          if (list.length > 0 && !importAlbumId) {
            setImportAlbumId(list[0].id);
          }
        }, (err) => {
          console.error("Lỗi đồng bộ Albums:", err);
        });

        // 4. Đồng bộ kho hình ảnh (Photos)
        const photosRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'photos');
        const unsubscribePhotos = window.FirebaseSDK.onSnapshot(photosRef, (snap) => {
          const list = [];
          snap.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          // Sắp xếp ngày mới nhất lên trên
          list.sort((a, b) => new Date(b.date) - new Date(a.date));
          setPhotos(list);
          setIsLoading(false);
        }, (err) => {
          console.error("Lỗi đồng bộ Photos:", err);
          setIsLoading(false);
        });

        // 5. Đồng bộ dòng thời gian (Timeline)
        const timelineRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'timeline');
        const unsubscribeTimeline = window.FirebaseSDK.onSnapshot(timelineRef, (snap) => {
          const list = [];
          snap.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });
          // Sắp xếp theo năm tăng dần
          list.sort((a, b) => parseInt(a.year) - parseInt(b.year));
          setTimeline(list);
        }, (err) => {
          console.error("Lỗi đồng bộ Timeline:", err);
        });

        return () => {
          unsubscribeSettings();
          unsubscribeMembers();
          unsubscribeAlbums();
          unsubscribePhotos();
          unsubscribeTimeline();
        };
      }, [isAuthed]);

      const initializeDefaultFirestoreData = async () => {
        try {
          // Ghi dữ liệu cấu hình

                        <button type="button" onClick={() => setGPhotosSyncTab('auto')} className={`flex-1 py-1 rounded-lg ${gPhotosSyncTab === 'auto' ? 'bg-amber-800 text-white' : 'text-slate-500'}`}>Quét Link tự động</button>
                        <button type="button" onClick={() => setGPhotosSyncTab('manualHtml')} className={`flex-1 py-1 rounded-lg ${gPhotosSyncTab === 'manualHtml' ? 'bg-amber-800 text-white' : 'text-slate-500'}`}>Đồng bộ bằng mã HTML</button>
                      </div>

                      {gPhotosSyncTab === 'auto' ? (
                        <div className="p-4 bg-amber-50/50 border rounded-xl space-y-2 text-xs">
                          <input type="text" value={inputAlbumUrl} onChange={(e) => setInputAlbumUrl(e.target.value)} placeholder="Dán link chia sẻ Album Google Photos công khai..." className="w-full border p-2 rounded-lg font-mono" />
                          <button onClick={() => handleImportAlbum(inputAlbumUrl, importTargetType, importAlbumId, importNewAlbumName)} disabled={isScraping || !inputAlbumUrl.trim()} className="w-full py-2 bg-amber-800 text-white rounded-lg font-bold hover:bg-amber-950 transition-all disabled:opacity-50">{isScraping ? 'Đang thực hiện đồng bộ...' : '🌐 Quét và nạp dữ liệu Album'}</button>
                        </div>
                      ) : (
                        <div className="p-4 bg-indigo-50/50 border rounded-xl space-y-2 text-xs">
                          <textarea value={pastedHtmlSource} onChange={(e) => setPastedHtmlSource(e.target.value)} placeholder="Nhấn Ctrl+U ở trang Album Google Photos, Copy và Paste toàn bộ mã nguồn vào đây..." rows={3} className="w-full border p-2 rounded-lg font-mono" />
                          <button onClick={() => handleImportFromPastedHtml(importTargetType, importAlbumId, importNewAlbumName)} disabled={isScraping || !pastedHtmlSource.trim()} className="w-full py-2 bg-indigo-800 text-white rounded-lg font-bold hover:bg-indigo-950 transition-all disabled:opacity-50">🚀 Đồng bộ ảnh từ mã nguồn HTML</button>
                        </div>
                      )}

                      <div className="p-4 bg-rose-50/50 border border-rose-100 rounded-xl space-y-2 text-xs">
                        <label className="block font-bold text-rose-950">📥 Thêm thủ công đường dẫn hình ảnh đơn lẻ</label>
                        <textarea
                          value={inputDirectUrls}
                          onChange={(e) => setInputDirectUrls(e.target.value)}
                          placeholder="Mỗi dòng tương ứng với một liên kết ảnh trực tiếp..."
                          rows={3}
                          className="w-full border rounded-lg p-2 font-mono outline-none focus:ring-1 focus:ring-rose-400"
                        />
                        <button
                          type="button"
                          onClick={() => handleImportDirectLinks(importTargetType, importAlbumId, importNewAlbumName)}
                          disabled={!inputDirectUrls.trim()}
                          className="w-full py-2 bg-rose-700 text-white rounded-lg font-bold hover:bg-rose-800 transition-colors disabled:opacity-50"
                        >
                          📥 Nạp danh sách ảnh
                        </button>
                      </div>

                      <div className="bg-slate-50 p-3 rounded-lg border text-xs space-y-2">
                        <label className="block font-bold">Chọn Album đích nạp ảnh:</label>
                        <div className="flex gap-4">
                          <label className="flex items-center space-x-1"><input type="radio" checked={importTargetType === 'existing'} onChange={() => setImportTargetType('existing')} /><span>Vào album:</span></label>
                          <label className="flex items-center space-x-1 text-rose-700 font-bold"><input type="radio" checked={importTargetType === 'new'} onChange={() => setImportTargetType('new')} /><span>Tự tạo Quyển mới tinh</span></label>
                        </div>
                        {importTargetType === 'existing' ? (
                          <select value={importAlbumId} onChange={(e) => setImportAlbumId(e.target.value)} className="w-full border rounded p-1.5 bg-white">{albums.map(al => <option key={al.id} value={al.id}>{al.name}</option>)}</select>
                        ) : (
                          <input type="text" value={importNewAlbumName} onChange={(e) => setImportNewAlbumName(e.target.value)} placeholder="Nhập tên Quyển Album mới..." className="w-full border rounded p-1.5 bg-white font-bold" />
                        )}
                      </div>

                      <div className="space-y-3 max-h-[35vh] overflow-y-auto pr-1">
                        {photos.map((photo) => (
                          <div key={photo.id} className="p-3 border rounded-xl bg-slate-100 space-y-2 relative text-xs flex gap-3">
                            <img src={photo.url} className="w-16 h-14 object-cover rounded border self-center" onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=200" }} />
                            <div className="flex-grow space-y-1.5">
                              <div className="flex gap-1">
                                <input type="text" value={photo.url} onChange={(e) => handleUpdatePhoto(photo.id, 'url', e.target.value)} className="flex-grow border rounded px-1.5 py-0.5 font-mono text-[10px]" placeholder="Link hình ảnh URL" />
                                <button type="button" onClick={() => setHtmlExtractorTarget({ type: 'photo', id: photo.id })} className="px-1.5 bg-rose-100 hover:bg-rose-200 text-rose-900 rounded text-[10px] font-bold">Bóc HTML</button>
                              </div>
                              <input type="text" value={photo.caption} onChange={(e) => handleUpdatePhoto(photo.id, 'caption', e.target.value)} className="w-full border rounded px-1.5 py-0.5 text-[11px]" placeholder="Chú thích ảnh" />
                            </div>
                            <button onClick={() => handleDeletePhoto(photo.id)} className="text-slate-400 hover:text-rose-600 absolute top-1 right-2 font-bold text-sm">×</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'members' && (
                    <div className="space-y-4">
                      {members.map((member) => (
                        <div key={member.id} className="p-4 border rounded-xl bg-slate-50 space-y-2 relative text-xs">
                          <button onClick={() => handleDeleteMember(member.id)} className="absolute top-2 right-2 text-slate-400 hover:text-rose-600">✕</button>
                          <div className="grid grid-cols-2 gap-2">
                            <input type="text" value={member.name} onChange={(e) => handleUpdateMember(member.id, 'name', e.target.value)} className="border rounded px-2 py-1" placeholder="Tên" />
                            <input type="text" value={member.role} onChange={(e) => handleUpdateMember(member.id, 'role', e.target.value)} className="border rounded px-2 py-1" placeholder="Vai trò" />
                          </div>
                          <div className="flex gap-2">
                            <input type="text" value={member.avatar} onChange={(e) => handleUpdateMember(member.id, 'avatar', e.target.value)} className="flex-grow border rounded px-2 py-1 font-mono" placeholder="Link ảnh đại diện" />
                            <button type="button" onClick={() => setActiveAvatarSelectorMemberId(member.id)} className="px-2 py-1 bg-amber-100 text-amber-900 rounded text-[11px] hover:bg-amber-200">Từ kho ảnh</button>
                            <button type="button" onClick={() => setHtmlExtractorTarget({ type: 'member', id: member.id })} className="px-2 py-1 bg-rose-100 text-rose-900 rounded text-[11px] font-bold hover:bg-rose-200">HTML</button>
                          </div>
                          <input type="text" value={member.bio} onChange={(e) => handleUpdateMember(member.id, 'bio', e.target.value)} className="w-full border rounded px-2 py-1" placeholder="Giới thiệu" />
                        </div>
                      ))}
                      <button onClick={handleAddMember} className="w-full py-2 bg-amber-800 text-white rounded-xl text-xs font-bold hover:bg-amber-900 transition-all">+ Thêm thành viên mới</button>
                    </div>
                  )}

                  {activeTab === 'timeline' && (
                    <div className="space-y-4">
                      {timeline.map((event) => (
                        <div key={event.id} className="p-4 border rounded-xl bg-slate-50 space-y-2 relative text-xs">
                          <button onClick={() => handleDeleteTimeline(event.id)} className="absolute top-2 right-2 text-slate-400 hover:text-rose-600">✕</button>
                          <div className="grid grid-cols-3 gap-2">
                            <input type="text" value={event.year} onChange={(e) => handleUpdateTimeline(event.id, 'year', e.target.value)} className="border rounded px-2 py-1 font-mono" placeholder="Năm" />
                            <input type="text" value={event.title} onChange={(e) => handleUpdateTimeline(event.id, 'title', e.target.value)} className="col-span-2 border rounded px-2 py-1" placeholder="Tên sự kiện" />
                          </div>
                          <textarea value={event.desc} onChange={(e) => handleUpdateTimeline(event.id, 'desc', e.target.value)} rows={1} className="w-full border rounded px-2 py-1" placeholder="Mô tả lại mốc lịch sử..." />
                        </div>
                      ))}
                      <button onClick={handleAddTimeline} className="w-full py-2 bg-amber-800 text-white rounded-xl text-xs font-bold hover:bg-amber-900 transition-all">+ Thêm cột mốc mới</button>
                    </div>
                  )}

                  {activeTab === 'github' && (
                    <div className="space-y-4 text-xs font-sans">
                      <div className="p-4 bg-gradient-to-r from-emerald-500/10 to-teal-500/10 border border-emerald-200/50 rounded-2xl space-y-3">
                        <h4 className="font-bold text-emerald-950 text-sm flex items-center space-x-1.5">
                          <span>💾</span><span>Sao lưu & Khôi phục dữ liệu vĩnh viễn</span>
                        </h4>
                        <p className="text-xs text-slate-600 leading-relaxed">
                          Tải về tệp dự phòng cấu trúc dữ liệu JSON lên thiết bị máy tính của bạn. Dễ dàng nạp lại bất cứ lúc nào để phục hồi nguyên vẹn 100% hình ảnh trên Đám mây.
                        </p>
                        <div className="grid grid-cols-2 gap-3 pt-1">
                          <button
                            type="button"
                            onClick={handleExportBackup}
                            className="py-2.5 bg-emerald-700 hover:bg-emerald-800 text-white rounded-xl text-xs font-bold transition-all shadow-md flex items-center justify-center space-x-1"
                          >
                            <span>📥 Tải file sao lưu</span>
                          </button>
                          <label className="py-2.5 bg-teal-700 hover:bg-teal-800 text-white rounded-xl text-xs font-bold transition-all shadow-md flex items-center justify-center space-x-1 cursor-pointer text-center">
                            <span>📤 Tải file khôi phục</span>
                            <input type="file" accept=".json" onChange={handleImportBackup} className="hidden" />
                          </label>
                        </div>
                      </div>

                      <div className="p-4 bg-orange-50 border border-orange-100 rounded-xl space-y-2 text-orange-950 leading-relaxed">
                        <p className="font-bold">🚀 Quy trình đồng bộ GitHub đơn giản:</p>
                        <ol className="list-decimal list-inside space-y-1 text-[11px] text-slate-700">
                          <li>Bố cục lại thông tin, cập nhật hình ảnh và thiết lập của riêng gia đình mình.</li>
                          <li>Nhấn nút <strong>"📋 Sao chép mã cấu hình"</strong> ở dưới.</li>
                          <li>Mở file <code className="bg-white px-1 font-mono text-rose-600">index.html</code> trên GitHub của bạn.</li>
                          <li>Tìm vùng dữ liệu từ khóa <code>INITIAL_SETTINGS = ...</code> cho đến hết vạch phân cách.</li>
                          <li>Dán đè mã đã copy lên và chọn <strong>Commit changes</strong>.</li>
                        </ol>
                      </div>

                      <div className="space-y-3">
                        <button onClick={handleCopyConfigToClipboard} className="w-full py-3 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-2 shadow-md">
                          <span>📋 Sao chép mã cấu hình GitHub</span>
                        </button>
                        <button onClick={handleRestoreFromGithubDefaults} className="w-full py-2 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-xl text-xs font-bold transition-all">🔄 Tải lại cấu hình nguyên bản ban đầu</button>
                        <div className="space-y-1.5">
                          <label className="block text-[10px] font-bold text-slate-400 uppercase">Khung chứa mã đồng bộ trực tiếp:</label>
                          <textarea readOnly value={getGeneratedConfigString()} rows={5} className="w-full border bg-slate-50 text-[10px] font-mono rounded-xl p-3 outline-none text-slate-600" onClick={(e) => e.target.select()} />
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-4 border-t bg-slate-50 flex justify-end">
                  <button onClick={handleSaveAllAndClose} className="px-5 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-sm font-bold shadow-md">Hoàn tất & Lưu lại</button>
                </div>
              </div>
            </div>
          )}

          {/* --- CÁC DIALOG LỰA CHỌN PHỤ --- */}
          {activeAvatarSelectorMemberId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4">
              <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
                <div className="p-5 border-b flex items-center justify-between bg-amber-50/50"><h3 className="text-lg font-bold font-serif text-amber-900">Chọn ảnh đại diện từ Thư viện</h3><button onClick={() => setActiveAvatarSelectorMemberId(null)} className="p-1 text-slate-500">✕</button></div>
                <div className="p-6 overflow-y-auto flex-grow bg-[#FAF6F0]/20">
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    {photos.map((photo) => (<div key={photo.id} onClick={() => handleSelectAvatarFromAlbum(photo.url)} className="group relative aspect-square bg-slate-100 rounded-xl overflow-hidden cursor-pointer hover:ring-4 hover:ring-amber-500 transition-all shadow-sm"><img src={photo.url} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><span className="text-white text-xs font-bold bg-amber-800 px-2.5 py-1 rounded-full">Chọn ảnh này</span></div></div>))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeCoverSelectorAlbumId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4">
              <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
                <div className="p-5 border-b flex items-center justify-between bg-amber-50/50"><h3 className="text-lg font-bold font-serif text-amber-900">Chọn ảnh bìa Quyển Album</h3><button onClick={() => setActiveCoverSelectorAlbumId(null)} className="p-1 text-slate-500">✕</button></div>
                <div className="p-6 overflow-y-auto flex-grow bg-[#FAF6F0]/20">
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    {photos.map((photo) => (<div key={photo.id} onClick={() => handleSelectCoverFromAlbum(photo.url)} className="group relative aspect-square bg-slate-100 rounded-xl overflow-hidden cursor-pointer hover:ring-4 hover:ring-amber-500 transition-all shadow-sm"><img src={photo.url} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><span className="text-white text-xs font-bold bg-amber-800 px-2.5 py-1 rounded-full">Chọn làm bìa</span></div></div>))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {htmlExtractorTarget && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border flex flex-col space-y-4">
                <div className="flex items-center space-x-2 text-amber-900 border-b pb-3"><h3 className="text-lg font-bold font-serif">Bóc tách ảnh từ Google Photos HTML</h3></div>
                <textarea value={singleHtmlInput} onChange={(e) => setSingleHtmlInput(e.target.value)} placeholder="Nhấp chuột vào đây và dán toàn bộ mã nguồn HTML của bức ảnh (Ctrl+V)..." rows={6} className="w-full border rounded-xl p-3 text-xs font-mono outline-none focus:ring-1 focus:ring-amber-500" />
                <div className="flex space-x-2">
                  <button type="button" onClick={() => { setHtmlExtractorTarget(null); setSingleHtmlInput(''); }} className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200">Hủy</button>
                  <button type="button" onClick={handleExtractSingleFromHtml} className="flex-1 py-2 bg-amber-800 text-white rounded-xl text-xs font-bold hover:bg-amber-900">🚀 Bóc tách</button>
                </div>
              </div>
            </div>
          )}

          {/* --- HỘP THOẠI THÔNG BÁO NỘI BỘ (CUSTOM ALERT MODAL) --- */}
          {customAlert.show && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-xs p-4 animate-fade-in">
              <div className="bg-white rounded-2xl max-w-xs w-full p-6 text-center shadow-2xl space-y-4 border border-amber-100">
                <div className="w-12 h-12 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center mx-auto text-xl">✨</div>
                <p className="text-sm font-semibold text-slate-800 leading-relaxed">{customAlert.message}</p>
                <button 
                  onClick={() => setCustomAlert({ show: false, message: "" })} 
                  className="w-full py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold shadow-md"
                >
                  Xác nhận
                </button>
              </div>
            </div>
          )}

          {/* --- HỘP THOẠI XÁC NHẬN NỘI BỘ (CUSTOM CONFIRM MODAL) --- */}
          {customConfirm.show && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-xs p-4 animate-fade-in">
              <div className="bg-white rounded-2xl max-w-xs w-full p-6 text-center shadow-2xl space-y-4 border border-amber-100">
                <div className="w-12 h-12 bg-rose-100 text-rose-800 rounded-full flex items-center justify-center mx-auto text-xl">❓</div>
                <p className="text-sm font-semibold text-slate-800 leading-relaxed">{customConfirm.message}</p>
                <div className="flex space-x-2">
                  <button 
                    onClick={() => setCustomConfirm({ show: false, message: "", onConfirm: null })} 
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold"
                  >
                    Hủy bỏ
                  </button>
                  <button 
                    onClick={() => {
                      if (customConfirm.onConfirm) customConfirm.onConfirm();
                      setCustomConfirm({ show: false, message: "", onConfirm: null });
                    }} 
                    className="flex-1 py-2 bg-rose-700 hover:bg-rose-800 text-white rounded-xl text-xs font-bold shadow-md"
                  >
                    Đồng ý
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
