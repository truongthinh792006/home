    const isGooglePhotosPageUrl = (url) => {
      if (!url) return false;
      return url.includes('photos.google.com/share') || url.includes('photos.app.goo.gl') || url.includes('photos.google.com/photo');

    const decodeGooglePhotosHtml = (html) => {
      if (!html) return '';
      try {
        let decoded = html.replace(/\\u([0-9a-fA-F]{4})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\x([0-9a-fA-F]{2})/g, (match, grp) => {
          return String.fromCharCode(parseInt(grp, 16));
        });
        decoded = decoded.replace(/\\([\/])/g, '$1');
        decoded = decoded.replace(/\\"/g, '"');
        return decoded;
      } catch (e) {
        return html;
      }
    };

    const isActualGooglePhoto = (url) => {
      if (!url) return false;
      const lowerUrl = url.toLowerCase();
      const isGoogle = lowerUrl.includes('googleusercontent.com') || lowerUrl.includes('usercontent.google');
      if (!isGoogle) return true;

      const hasPhotoPattern = lowerUrl.includes('/pw/') || lowerUrl.includes('/p/') || lowerUrl.includes('/lr/');
      const isAvatar = lowerUrl.includes('/a/') || lowerUrl.includes('/a-/') || lowerUrl.includes('/profile/') || lowerUrl.includes('/contacts/');

      return hasPhotoPattern && !isAvatar;
    };

    // Hàm phân tích ngày cực kỳ an toàn tương thích 100% với Safari, iOS, Android và mọi trình duyệt di động
    const parseAnniversaryDate = (dateStr) => {
      if (!dateStr) return new Date();
      const normalized = dateStr.replace(/-/g, '/');
      const parsed = new Date(normalized);
      if (!isNaN(parsed.getTime())) return parsed;
      
      const fallback = new Date(dateStr);
      if (!isNaN(fallback.getTime())) return fallback;
      
      const parts = dateStr.split(/[-/]/);
      if (parts.length === 3) {
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1; 
        const day = parseInt(parts[2], 10);
        const manualDate = new Date(year, month, day);
        if (!isNaN(manualDate.getTime())) return manualDate;
      }
      return new Date(); 
    };

            {initials}
          </div>
        </div>
      );

          const matchesCaptionFilter = photo.caption.toLowerCase().includes(colFilters.task.toLowerCase());
          const matchesDateFilter = photo.date.includes(colFilters.due);

          return matchesSearch && matchesIdFilter && matchesAppFilter && matchesCaptionFilter && matchesDateFilter;
        })
        .sort((a, b) => {
          let fieldA = a[sortField] || '';
          let fieldB = b[sortField] || '';

            fieldB = albums.find(al => al.id === b.albumId)?.name || '';

          return;

          const foundUrls = new Set();
          let match;
          
          while ((match = regex.exec(cleanHtml)) !== null) {
            const imageUrl = match[1];
            if (isActualGooglePhoto(imageUrl)) {
              foundUrls.add(imageUrl.split('=')[0]);
            }
          }

          const uniqueUrls = Array.from(foundUrls);

          if (uniqueUrls.length === 0) {
            throw new Error('Không lấy được dữ liệu ảnh. Hãy dán link album dài (bắt đầu bằng https://photos.google.com/share/...) hoặc sử dụng tính năng dán trực tiếp danh sách link ảnh hoặc mã nguồn HTML ở các ngăn bên dưới.');
          }

          let finalAlbumId = targetAlbumId;

          if (importTargetType === 'new') {
            const resolvedName = importNewAlbumName.trim() || `Album mới (${new Date().toLocaleDateString('vi-VN')})`;
            const newAlbumId = 'album_' + Date.now().toString();
            const firstImgCover = `${uniqueUrls[0]}=w600`;
            
            const newAlbum = {
              id: newAlbumId,
              name: resolvedName,
              desc: `Bộ sưu tập gồm ${uniqueUrls.length} ảnh tự động đồng bộ từ Google Photos.`,
              cover: firstImgCover
            };

            const updatedAlbums = [...albums, newAlbum];
            setAlbums(updatedAlbums);
            localStorage.setItem('family_albums', JSON.stringify(updatedAlbums));
            finalAlbumId = newAlbumId;
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = uniqueUrls.map((rawUrl, i) => {
            return {
              id: `gphotos_${Date.now()}_${i}`,
              url: `${rawUrl}=w1000`,
              caption: `Kỷ niệm tự động quét #${i + 1}`,
              date: todayString,
              albumId: finalAlbumId
            };
          });

          const combined = [...newPhotos, ...photos];
          setPhotos(combined);
          localStorage.setItem('family_photos', JSON.stringify(combined));
          showToast(`🎉 Thành công! Đồng bộ hoàn tất. Đã thêm ${newPhotos.length} bức ảnh vào album của bạn.`);
          setInputAlbumUrl('');
          setImportNewAlbumName('');
          setActiveAlbumId(finalAlbumId); // Tự động mở xem album mới đồng bộ luôn
          setShowSettings(false); // Tắt bảng cài đặt để xem kết quả
        } catch (err) {
          setScrapeError(err.message || 'Lỗi bóc tách tệp Album.');
        } finally {
          setIsScraping(false);
          setCurrentProxyStatus('');
        }
      };

      const handleImportDirectLinks = (targetType, existingId, newName) => {
        if (!inputDirectUrls.trim()) return;
        setIsScraping(true);
        setScrapeError(null);
        setScrapeSuccess('');

        try {
          const lines = inputDirectUrls.split('\n');
          const validUrls = lines
            .map(line => line.trim())
            .filter(line => line.startsWith('http://') || line.startsWith('https://'));

          if (validUrls.length === 0) {
            throw new Error('Không tìm thấy đường dẫn liên kết ảnh hợp lệ nào (bắt đầu bằng http:// hoặc https://)');

          let finalAlbumId = existingId;

          if (targetType === 'new') {
            const resolvedName = newName.trim() || `Album mới (${new Date().toLocaleDateString('vi-VN')})`;
            const newAlbumId = 'album_' + Date.now().toString();
            const firstImgCover = validUrls[0];
            
            const newAlbum = {
              id: newAlbumId,
              name: resolvedName,
              desc: `Bộ sưu tập gồm ${validUrls.length} ảnh tự động thêm từ danh sách link.`,
              cover: firstImgCover
            };

            const updatedAlbums = [...albums, newAlbum];
            setAlbums(updatedAlbums);
            localStorage.setItem('family_albums', JSON.stringify(updatedAlbums));
            finalAlbumId = newAlbumId;
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = validUrls.map((rawUrl, i) => {
            return {
              id: `direct_${Date.now()}_${i}`,
              url: rawUrl,
              caption: `Kỷ niệm nạp thủ công #${i + 1}`,
              date: todayString,
              albumId: finalAlbumId

          setPhotos(combined);
          localStorage.setItem('family_photos', JSON.stringify(combined));
          showToast("🎉 Thành công! Đã thêm " + newPhotos.length + " bức ảnh vào album của bạn.");
          setInputDirectUrls('');
          setImportNewAlbumName('');

    // ⚠️ PHẦN KHỞI TẠO DỮ LIỆU GỐC (DÀNH CHO KHÁCH TRUY CẬP LẦN ĐẦU)

    // =========================================================================`;

      const handleCopyConfigToClipboard = () => {

                            <span>📥 Tải file sao lưu (.json)</span>
                          </button>
                          
                          <label className="py-2.5 bg-teal-700 hover:bg-teal-800 text-white rounded-xl text-xs font-bold transition-all shadow-md flex items-center justify-center space-x-1.5 cursor-pointer text-center active:scale-95">
                            <span>📤 Khôi phục dữ liệu</span>
                            <input 
                              type="file" 
                              accept=".json" 
                              onChange={handleImportBackup} 
                              className="hidden" 
                            />
                          </label>
                        </div>
                      </div>

                      <div className="p-4 bg-orange-50 border border-orange-100 rounded-xl space-y-2 text-xs">
                        <h4 className="font-bold text-orange-950 flex items-center space-x-1.5">
                          <span>🚀</span>
                          <span>Quy trình đồng bộ cực kỳ đơn giản:</span>
                        </h4>
                        <ol className="text-[11px] text-orange-900/90 list-decimal list-inside space-y-1.5 pl-1 leading-relaxed">
                          <li>Bạn dán dập Album Google Photos, dán danh sách link, hay sửa đổi ngày kỷ niệm trực tiếp trên trang web cho đến khi ưng ý.</li>
                          <li>Nhấn nút <strong>"📋 Sao chép cấu hình"</strong> ở bên dưới.</li>
                          <li>Mở file <code className="bg-white px-1 py-0.5 rounded border border-orange-200 font-mono">index.html</code> của bạn trên GitHub.</li>
                          <li>Bôi đen để chọn toàn bộ đoạn mã khởi tạo ở đầu file (bắt đầu từ dòng <code className="font-mono bg-white text-[10px] text-rose-600 font-bold">INITIAL_SETTINGS = ...</code> cho đến hết dấu <code className="font-mono bg-white text-[10px] text-rose-600 font-bold">// ====================...</code>).</li>
                          <li>Dán đè (Paste) đoạn mã bạn vừa copy vào đó và ấn <strong>Commit changes</strong>.  liền lập tức cập nhật!</li>
                        </ol>
                      </div>

                      <div className="space-y-3">
                        <button
                          type="button"
                          onClick={handleCopyConfigToClipboard}
                          className="w-full py-3 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-2 shadow-md shadow-amber-800/10 active:scale-[0.99]"
                        >
                          <span>📋 Sao chép mã cấu hình</span>
                        </button>

                        <button
                          type="button"
                          onClick={handleRestoreFromGithubDefaults}
                          className="w-full py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-2"
                        >
                          <span>🔄 Đồng bộ ngược lại từ tệp GitHub gốc</span>
                        </button>

                        <div className="space-y-1.5">
                          <label className="block text-[10px] font-bold text-slate-400 uppercase">Xem trước đoạn mã sẽ đồng bộ:</label>
                          <textarea
                            readOnly
                            value={getGeneratedConfigString()}
                            rows={8}
                            className="w-full border border-slate-200 bg-slate-50 text-[10px] font-mono rounded-xl p-3 outline-none text-slate-600"
                            onClick={(e) => e.target.select()}
                          />
                        </div>
                      </div>
                    </div>
                  )}

                </div>

                {/* Chân bảng điều khiển */}
                <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                  <button 
                    onClick={() => setShowSettings(false)}
                    className="px-5 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-sm font-bold shadow-md shadow-amber-900/10 transition-all"
                  >
                    Hoàn tất & Lưu lại
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- MODAL CHỌN ẢNH ĐẠI DIỆN TỪ ALBUM --- */}
          {activeAvatarSelectorMemberId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm p-4 animate-fade-in font-sans">
              <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col overflow-hidden shadow-2xl border border-amber-100">
                
                <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-amber-50/50">
                  <div className="flex items-center space-x-2 text-amber-900">
                    <span className="text-xl">📸</span>
                    <h3 className="text-lg font-bold font-serif">Chọn ảnh đại diện từ thư viện ảnh gia đình</h3>
                  </div>
                  <button 
                    onClick={() => setActiveAvatarSelectorMemberId(null)}
                    className="p-1 hover:bg-amber-100 text-slate-500 hover:text-slate-800 rounded-full transition-colors"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <div className="p-6 overflow-y-auto flex-grow bg-[#FAF6F0]/20">
                  {photos.length === 0 ? (
                    <div className="text-center py-12 text-slate-400">
                      Chưa có bức ảnh nào được nạp vào album. Hãy dán link ảnh thủ công hoặc quét album trước nhé!
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                      {photos.map((photo) => (
                        <div 
                          key={photo.id}
                          onClick={() => handleSelectAvatarFromAlbum(photo.url)}
                          className="group relative aspect-square bg-slate-100 rounded-xl overflow-hidden cursor-pointer hover:ring-4 hover:ring-amber-500 transition-all shadow-sm"
                        >
                          <img 
                            src={photo.url} 
                            alt={photo.caption} 
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform" 
                          />
                          <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span className="text-white text-xs font-bold bg-amber-800 px-2.5 py-1 rounded-full shadow-md">Chọn ảnh này</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                  <button 
                    onClick={() => setActiveAvatarSelectorMemberId(null)}
                    className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-sm font-bold transition-all"
                  >
                    Đóng
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- MODAL CHỌN ẢNH BÌA ALBUM TỪ ALBUM --- */}
          {activeCoverSelectorAlbumId && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm p-4 animate-fade-in font-sans">
              <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] flex flex-col overflow-hidden shadow-2xl border border-amber-100">
                
                <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-amber-50/50">
                  <div className="flex items-center space-x-2 text-amber-900">
                    <span className="text-xl">📸</span>
                    <h3 className="text-lg font-bold font-serif">Chọn ảnh bìa đại diện cho Album</h3>
                  </div>
                  <button 
                    onClick={() => setActiveCoverSelectorAlbumId(null)}
                    className="p-1 hover:bg-amber-100 text-slate-500 hover:text-slate-800 rounded-full transition-colors"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <div className="p-6 overflow-y-auto flex-grow bg-[#FAF6F0]/20">
                  {photos.length === 0 ? (
                    <div className="text-center py-12 text-slate-400">
                      Chưa có bức ảnh nào để chọn làm bìa.
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                      {photos.map((photo) => (
                        <div 
                          key={photo.id}
                          onClick={() => handleSelectCoverFromAlbum(photo.url)}
                          className="group relative aspect-square bg-slate-100 rounded-xl overflow-hidden cursor-pointer hover:ring-4 hover:ring-amber-500 transition-all shadow-sm"
                        >
                          <img 
                            src={photo.url} 
                            alt={photo.caption} 
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform" 
                          />
                          <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span className="text-white text-xs font-bold bg-amber-800 px-2.5 py-1 rounded-full shadow-md">Chọn làm ảnh bìa</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                  <button 
                    onClick={() => setActiveCoverSelectorAlbumId(null)}
                    className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-sm font-bold transition-all"
                  >
                    Đóng
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- MODAL TRÍCH XUẤT ẢNH ĐƠN TỪ MÃ HTML --- */}
          {htmlExtractorTarget && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-xs p-4 animate-fade-in font-sans">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-rose-100 flex flex-col space-y-4">
                
                <div className="flex items-center space-x-2 text-rose-900 border-b border-slate-100 pb-3">
                  <span className="text-xl">📋</span>
                  <h3 className="text-lg font-bold font-serif">Trích xuất ảnh đơn từ mã HTML</h3>
                </div>

                <div className="p-3 bg-rose-50/50 rounded-xl border border-rose-100 text-[11px] leading-relaxed text-rose-950 space-y-1">
                  <p className="font-bold">💡 Hướng dẫn lấy mã HTML của ảnh:</p>
                  <ol className="list-decimal list-inside space-y-0.5">
                    <li>Mở bức ảnh đơn đó trên Google Photos (xem to toàn màn hình).</li>
                    <li>Nhấn <code className="bg-white px-1 border rounded">Ctrl + U</code> (Xem mã nguồn trang web).</li>
                    <li>Nhấn <code className="bg-white px-1 border rounded">Ctrl + A</code> để chọn tất cả ➜ rồi <code className="bg-white px-1 border rounded">Ctrl + C</code> để Sao chép.</li>
                    <li>Dán tất cả mã đó vào ô nhập dưới đây và bấm nút Trích xuất.</li>
                  </ol>
                </div>

                <textarea
                  value={singleHtmlInput}
                  onChange={(e) => setSingleHtmlInput(e.target.value)}
                  placeholder="Nhấp chuột vào đây và nhấn Ctrl+V để dán toàn bộ mã nguồn của bức ảnh..."
                  rows={6}
                  className="w-full border border-slate-200 bg-white rounded-xl p-3 text-xs font-mono focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none"
                />

                <div className="flex space-x-2 pt-1 font-sans">
                  <button 
                    type="button"
                    onClick={() => { setHtmlExtractorTarget(null); setSingleHtmlInput(''); }}
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all"
                  >
                    Hủy bỏ
                  </button>
                  <button 
                    type="button"
                    onClick={handleExtractSingleFromHtml}
                    className="flex-1 py-2 bg-rose-700 hover:bg-rose-800 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-rose-700/10 font-bold"
                  >
                    🚀 Trích xuất ảnh
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- HỘP THOẠI THÔNG BÁO TOAST --- */}
          {notification && (
            <div className="fixed bottom-4 right-4 z-50 bg-slate-900/95 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 transition-all duration-300 animate-slide-in font-sans">
              <span className="text-lg">{notification.type === 'error' ? '⚠️' : '🎉'}</span>
              <span className="text-xs md:text-sm font-semibold tracking-wide">{notification.text}</span>
              <button onClick={() => setNotification(null)} className="text-white/50 hover:text-white font-bold text-sm ml-2">×</button>
            </div>
          )}

          {/* --- HỘP THOẠI XÁC NHẬN TÙY CHỈNH --- */}
          {confirmDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-xs p-4 font-sans">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-amber-100 text-center space-y-4">
                <div className="w-12 h-12 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center mx-auto text-xl">
                  ❓
                </div>
                <div>
                  <h3 className="text-lg font-bold text-amber-955 font-serif">Xác Nhận Hành Động</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed font-sans">{confirmDialog.text}</p>
                </div>
                <div className="flex space-x-2 pt-2 font-sans">
                  <button 
                    onClick={() => setConfirmDialog(null)}
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all"
                  >
                    Hủy bỏ
                  </button>
                  <button 
                    onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }}
                    className="flex-1 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-amber-800/10"
                  >
                    Đồng ý
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
