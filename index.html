<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổ Ấm Yêu Thương - Album Gia Đình</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts hỗ trợ tiếng Việt hoàn chỉnh -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  <!-- React 18 & ReactDOM 18 CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel để biên dịch JSX trực tiếp trên trình duyệt -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ép phông chữ hiển thị chuẩn, mượt mà và không bị lỗi dấu tiếng Việt */
    .font-serif {
      font-family: 'Playfair Display', Georgia, Times, serif !important;
    }
    .font-sans, body {
      font-family: 'Quicksand', system-ui, -apple-system, sans-serif !important;
    }
    /* Chuyển động xoay mượt mà cho đĩa nhạc */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 15s linear infinite;
    }
  </style>
</head>
<body class="bg-orange-50/50">

  <div id="root"></div>

  <!-- Bắt đầu mã nguồn React biên dịch bởi Babel hỗ trợ ES Modules -->
  <script type="text/babel" data-type="module">
    // --- IMPORT CÁC CHỨC NĂNG LƯU TRỮ ĐÁM MÂY ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // --- CẤU HÌNH KẾT NỐI ĐÁM MÂY TỰ ĐỘNG ---
    let app, auth, db, appId;
    let firebaseEnabled = false;

    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        const firebaseConfig = JSON.parse(__firebase_config);
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        firebaseEnabled = true;
      }
    } catch (e) {
      console.warn("Đang chạy chế độ ngoại tuyến (localStorage). Kết nối đám mây chưa được thiết lập.");
    }

    // --- DỮ LIỆU MẶC ĐỊNH BAN ĐẦU ---
    const INITIAL_MEMBERS = [
      { id: '1', name: 'Ba Thịnh', role: 'Trụ cột vững chãi', bio: 'Thích uống Cafe, và cực kỳ chiều chuộng cả nhà.', avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150&auto=format&fit=crop&q=80' },
      { id: '2', name: 'Mẹ Nhi', role: 'Bếp trưởng ấm áp', bio: 'Bàn tay vàng trong làng nấu nướng, giữ ngọn lửa yêu thương cho tổ ấm.', avatar: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150&auto=format&fit=crop&q=80' },
      { id: '3', name: 'Anh Hai Bin', role: 'Lập trình viên tương lai', bio: 'Thích âm nhạc, lập trình viên tương lai.', avatar: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=150&auto=format&fit=crop&q=80' },
      { id: '4', name: 'Em Bo', role: 'Vitamin vui vẻ', bio: 'Yêu ca hát, nguồn năng lượng tích cực và là cục cưng của cả nhà.', avatar: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150&auto=format&fit=crop&q=80' }
    ];

    const INITIAL_PHOTOS = [
      { id: '1', url: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=1000&auto=format&fit=crop&q=80', caption: 'Bữa cơm sum vầy ngày cuối năm', date: '2026-02-15', category: 'Tết' },
      { id: '2', url: 'https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=1000&auto=format&fit=crop&q=80', caption: 'Chuyến du lịch biển Nha Trang đầy nắng', date: '2025-06-20', category: 'Du lịch' },
      { id: '3', url: 'https://images.unsplash.com/photo-1543269865-cbf427effbad?w=1000&auto=format&fit=crop&q=80', caption: 'Kỷ niệm ngày cưới 25 năm của Bố Mẹ', date: '2025-10-10', category: 'Kỷ niệm' },
      { id: '4', url: 'https://images.unsplash.com/photo-1516627145497-ae6968895b74?w=1000&auto=format&fit=crop&q=80', caption: 'Một chiều bình yên cùng nhau đọc sách', date: '2026-01-05', category: 'Thường nhật' },
      { id: '5', url: 'https://images.unsplash.com/photo-1489710437560-659882b5c822?w=1000&auto=format&fit=crop&q=80', caption: 'Út Vy đón tuổi mới ngập trạng bóng bay', date: '2025-12-01', category: 'Kỷ niệm' },
      { id: '6', url: 'https://images.unsplash.com/photo-1472289065668-ce650ac443d2?w=1000&auto=format&fit=crop&q=80', caption: 'Cả nhà cùng trang trí cây đào đón Tết', date: '2026-02-14', category: 'Tết' }
    ];

    const INITIAL_TIMELINE = [
      { id: '1', year: '1998', title: 'Ngày chung đôi', desc: 'Ba Thịnh và Mẹ Nhi chính thức về chung một nhà dưới sự chúc phúc của gia đình.' },
      { id: '2', year: '2001', title: 'Chào đời Anh Hai Bin', desc: 'Thành viên nhỏ đầu tiên xuất hiện mang theo bao niềm vui và hoài bão mới.' },
      { id: '3', year: '2007', title: 'Chào đời Em Bo dễ thương', desc: 'Tổ ấm nhỏ đã đủ nếp đủ tẻ, rộn rã tiếng cười đùa trẻ thơ mỗi ngày.' },
      { id: '4', year: '2018', title: 'Ngôi nhà mới, khởi đầu mới', desc: 'Cả nhà cùng chuyển về tổ ấm tự tay thiết kế, bắt đầu viết tiếp những chương hạnh phúc.' }
    ];

    const CATEGORIES = ['Tất cả', 'Tết', 'Du lịch', 'Kỷ niệm', 'Thường nhật'];

    // --- CUSTOM SVG ICONS ---
    const HeartIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" className={className}>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    );

    const SettingsIcon = ({ className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    const TrashIcon = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    );

    const PlusIcon = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className={className}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
    );

    function App() {
      // --- STATE QUẢN LÝ DỮ LIỆU CHÍNH ---
      const [albumTitle, setAlbumTitle] = useState(() => localStorage.getItem('family_albumTitle') || 'Tổ Ấm Yêu Thương');
      const [albumSubtitle, setAlbumSubtitle] = useState(() => localStorage.getItem('family_albumSubtitle') || 'Nơi bão dừng sau cánh cửa - Kỷ niệm gia đình chúng mình');
      const [musicUrl, setMusicUrl] = useState(() => localStorage.getItem('family_musicUrl') || 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
      const [anniversaryDate, setAnniversaryDate] = useState(() => localStorage.getItem('family_anniversaryDate') || '1998-05-20');
      const [adminPin, setAdminPin] = useState(() => localStorage.getItem('family_adminPin') || '1234');
      
      const [members, setMembers] = useState(() => {
        const saved = localStorage.getItem('family_members');
        return saved ? JSON.parse(saved) : INITIAL_MEMBERS;
      });

      const [photos, setPhotos] = useState(() => {
        const saved = localStorage.getItem('family_photos');
        return saved ? JSON.parse(saved) : INITIAL_PHOTOS;
      });

      const [timeline, setTimeline] = useState(() => {
        const saved = localStorage.getItem('family_timeline');
        return saved ? JSON.parse(saved) : INITIAL_TIMELINE;
      });

      // --- TRẠNG THÁI KHÁC ---
      const [user, setUser] = useState(null); // Trạng thái xác thực đám mây
      const [selectedCategory, setSelectedCategory] = useState('Tất cả');
      const [activePhotoIndex, setActivePhotoIndex] = useState(null); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [daysTogether, setDaysTogether] = useState(0);

      // --- TEMP STATES ĐỂ SỬA TRONG CÀI ĐẶT TRÁNH RENDER LIÊN TỤC ---
      const [tempTitle, setTempAlbumTitle] = useState(albumTitle);
      const [tempSubtitle, setTempAlbumSubtitle] = useState(albumSubtitle);
      const [tempAnniversaryDate, setTempAnniversaryDate] = useState(anniversaryDate);
      const [tempAdminPin, setTempAdminPin] = useState(adminPin);
      const [tempMusicUrl, setTempMusicUrl] = useState(musicUrl);

      // --- BẢO MẬT PIN ---
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinInput, setPinInput] = useState('');
      const [pinError, setPinError] = useState('');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);

      // --- GOOGLE PHOTOS IMPORTER ---
      const [inputAlbumUrl, setInputAlbumUrl] = useState('');
      const [importCategory, setImportCategory] = useState('Thường nhật');
      const [isScraping, setIsScraping] = useState(false);
      const [scrapeError, setScrapeError] = useState(null);
      const [scrapeSuccess, setScrapeSuccess] = useState('');
      const [currentProxyStatus, setCurrentProxyStatus] = useState('');

      const [activeTab, setActiveTab] = useState('general'); 
      const audioRef = useRef(null);

      // --- 1. KHỞI TẠO VÀ XÁC THỰC ĐÁM MÂY (RULE 3) ---
      useEffect(() => {
        if (!firebaseEnabled) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Lỗi xác thực đám mây:", e);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- 2. ĐỒNG BỘ DỮ LIỆU ĐÁM MÂY THỜI GIAN THỰC (RULE 1 & 2) ---
      useEffect(() => {
        if (!firebaseEnabled || !user) return;

        // Đồng bộ Cài đặt chung
        const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
        const unsubSettings = onSnapshot(settingsDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.albumTitle) setAlbumTitle(data.albumTitle);
            if (data.albumSubtitle) setAlbumSubtitle(data.albumSubtitle);
            if (data.musicUrl) setMusicUrl(data.musicUrl);
            if (data.anniversaryDate) setAnniversaryDate(data.anniversaryDate);
            if (data.adminPin) setAdminPin(data.adminPin);
          } else {
            // Thiết lập giá trị mặc định lên đám mây nếu trống
            setDoc(settingsDocRef, {
              albumTitle,
              albumSubtitle,
              musicUrl,
              anniversaryDate,
              adminPin
            });
          }
        }, (err) => console.error("Lỗi đồng bộ Settings:", err));

        // Đồng bộ Thành viên
        const membersColRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const unsubMembers = onSnapshot(membersColRef, (querySnap) => {
          const fetched = [];
          querySnap.forEach((doc) => {
            fetched.push({ id: doc.id, ...doc.data() });
          });
          if (fetched.length > 0) {
            setMembers(fetched);
          } else {
            // Đưa dữ liệu mẫu lên đám mây nếu trống
            INITIAL_MEMBERS.forEach(m => {
              const { id, ...rest } = m;
              setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), rest);
            });
          }
        }, (err) => console.error("Lỗi đồng bộ Members:", err));

        // Đồng bộ Ảnh (Sắp xếp cục bộ theo Rule 2)
        const photosColRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
        const unsubPhotos = onSnapshot(photosColRef, (querySnap) => {
          const fetched = [];
          querySnap.forEach((doc) => {
            fetched.push({ id: doc.id, ...doc.data() });
          });
          fetched.sort((a, b) => b.date.localeCompare(a.date)); // Sắp xếp theo ngày mới nhất lên trước
          if (fetched.length > 0) {
            setPhotos(fetched);
          } else {
            // Đưa dữ liệu mẫu lên đám mây nếu trống
            INITIAL_PHOTOS.forEach(p => {
              const { id, ...rest } = p;
              setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id), rest);
            });
          }
        }, (err) => console.error("Lỗi đồng bộ Photos:", err));

        // Đồng bộ Cột mốc thời gian
        const timelineColRef = collection(db, 'artifacts', appId, 'public', 'data', 'timeline');
        const unsubTimeline = onSnapshot(timelineColRef, (querySnap) => {
          const fetched = [];
          querySnap.forEach((doc) => {
            fetched.push({ id: doc.id, ...doc.data() });
          });
          fetched.sort((a, b) => a.year.localeCompare(b.year)); // Sắp xếp theo năm tăng dần
          if (fetched.length > 0) {
            setTimeline(fetched);
          } else {
            // Đưa dữ liệu mẫu lên đám mây nếu trống
            INITIAL_TIMELINE.forEach(t => {
              const { id, ...rest } = t;
              setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timeline', id), rest);
            });
          }
        }, (err) => console.error("Lỗi đồng bộ Timeline:", err));

        return () => {
          unsubSettings();
          unsubMembers();
          unsubPhotos();
          unsubTimeline();
        };
      }, [user]);

      // Đồng bộ hóa các giá trị temp khi bảng cài đặt được bật
      useEffect(() => {
        if (showSettings) {
          setTempAlbumTitle(albumTitle);
          setTempAlbumSubtitle(albumSubtitle);
          setTempAnniversaryDate(anniversaryDate);
          setTempAdminPin(adminPin);
          setTempMusicUrl(musicUrl);
        }
      }, [showSettings]);

      // Tính số ngày bên nhau
      useEffect(() => {
        const calculateDays = () => {
          const start = new Date(anniversaryDate);
          const today = new Date();
          const diffTime = Math.abs(today - start);
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          setDaysTogether(diffDays);
        };
        calculateDays();
        const interval = setInterval(calculateDays, 1000 * 60 * 60); 
        return () => clearInterval(interval);
      }, [anniversaryDate]);

      // Quản lý phát nhạc
      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.loop = true;
          if (isPlaying) {
            audioRef.current.play().catch(err => {
              setIsPlaying(false);
            });
          } else {
            audioRef.current.pause();
          }
        }
      }, [isPlaying, musicUrl]);

      const togglePlay = () => {
        setIsPlaying(!isPlaying);
      };

      // Xử lý nút bấm cài đặt
      const handleSettingsClick = () => {
        if (isAdminAuthenticated) {
          setShowSettings(true);
        } else {
          setPinInput('');
          setPinError('');
          setShowPinModal(true);
        }
      };

      // Xác nhận PIN
      const handleVerifyPin = (e) => {
        e.preventDefault();
        if (pinInput === adminPin) {
          setIsAdminAuthenticated(true);
          setShowPinModal(false);
          setShowSettings(true);
          setPinError('');
        } else {
          setPinError('Mã PIN không chính xác!');
        }
      };

      // Lưu trữ cấu hình chung
      const handleSaveGeneralSettings = async () => {
        setAlbumTitle(tempTitle);
        setAlbumSubtitle(tempSubtitle);
        setAnniversaryDate(tempAnniversaryDate);
        setAdminPin(tempAdminPin);
        setMusicUrl(tempMusicUrl);

        if (firebaseEnabled && user) {
          const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
          await setDoc(settingsDocRef, {
            albumTitle: tempTitle,
            albumSubtitle: tempSubtitle,
            anniversaryDate: tempAnniversaryDate,
            adminPin: tempAdminPin,
            musicUrl: tempMusicUrl
          }, { merge: true });
        } else {
          localStorage.setItem('family_albumTitle', tempTitle);
          localStorage.setItem('family_albumSubtitle', tempSubtitle);
          localStorage.setItem('family_anniversaryDate', tempAnniversaryDate);
          localStorage.setItem('family_adminPin', tempAdminPin);
          localStorage.setItem('family_musicUrl', tempMusicUrl);
        }
        setShowSettings(false);
      };

      // Ánh xạ hàm để đóng bảng cài đặt
      const handleSaveAllAndClose = async () => {
        await handleSaveGeneralSettings();
      };

      // --- CÁC HÀM CRUD ĐỒNG BỘ TRỰC TIẾP ---
      const handleAddMember = async () => {
        const newMember = {
          id: Date.now().toString(),
          name: 'Thành viên mới',
          role: 'Vai trò',
          bio: 'Lời giới thiệu dễ thương...',
          avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&auto=format&fit=crop&q=80'
        };
        const updated = [...members, newMember];
        setMembers(updated);
        if (firebaseEnabled && user) {
          const { id, ...rest } = newMember;
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), rest);
        } else {
          localStorage.setItem('family_members', JSON.stringify(updated));
        }
      };

      const handleUpdateMember = async (id, field, value) => {
        const updated = members.map(m => m.id === id ? { ...m, [field]: value } : m);
        setMembers(updated);
        if (firebaseEnabled && user) {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), { [field]: value }, { merge: true });
        } else {
          localStorage.setItem('family_members', JSON.stringify(updated));
        }
      };

      const handleDeleteMember = async (id) => {
        const updated = members.filter(m => m.id !== id);
        setMembers(updated);
        if (firebaseEnabled && user) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id));
        } else {

        if (firebaseEnabled && user) {

      const handleAddTimeline = async () => {

          year: new Date().getFullYear().toString(),
          title: 'Mốc thời gian mới',
          desc: 'Chi tiết câu chuyện hạnh phúc vừa diễn ra...'

        const updated = [...timeline, newMilestone];

          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timeline', id), rest);
        } else {
          localStorage.setItem('family_timeline', JSON.stringify(updated));
        }
      };

      const handleUpdateTimeline = async (id, field, value) => {

        }
      };

      // ĐỒNG BỘ GOOGLE PHOTOS TRỰC TIẾP LÊN ĐÁM MÂY
      const handleImportAlbum = async (url, targetCategory) => {
        if (!url.trim()) return;
        setIsScraping(true);
        setScrapeError(null);
        setScrapeSuccess('');
        setCurrentProxyStatus('Đang kết nối cổng dữ liệu...');

        const proxyList = [
          {
            name: 'CorsProxy.io',
            getUrl: (target) => `https://corsproxy.io/?${encodeURIComponent(target)}`,
            parse: async (res) => await res.text()
          },
          {
            name: 'AllOrigins JSON',
            getUrl: (target) => `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
            parse: async (res) => {
              const json = await res.json();
              return json.contents;
            }
          }
        ];

        let htmlContents = null;
        let selectedProxyName = '';
        let lastError = null;

        for (let i = 0; i < proxyList.length; i++) {
          const proxy = proxyList[i];
          try {
            setCurrentProxyStatus(`Đang đồng bộ qua ${proxy.name}...`);
            const response = await fetch(proxy.getUrl(url.trim()));
            if (response.ok) {
              htmlContents = await proxy.parse(response);
              if (htmlContents && htmlContents.length > 500) {
                selectedProxyName = proxy.name;
                break;
              }
            }
          } catch (err) {
            lastError = err;
          }
        }

        if (!htmlContents) {
          setIsScraping(false);
          setScrapeError(`Cổng đồng bộ bận. Vui lòng thử lại sau vài giây.`);
          return;
        }

        try {
          setCurrentProxyStatus(`Đang phân tích liên kết...`);
          const regex = /(https:\/\/lh[3-6]\.googleusercontent\.com\/[a-zA-Z0-9\-_]{50,})/g;
          const foundUrls = new Set();
          let match;
          
          while ((match = regex.exec(htmlContents)) !== null) {
            const imageUrl = match[1];
            if (imageUrl.length > 80) {
              const cleanBaseUrl = imageUrl.split('=')[0];
              foundUrls.add(cleanBaseUrl);
            }
          }

          const uniqueUrls = Array.from(foundUrls);

          if (uniqueUrls.length === 0) {
            throw new Error('Không lấy được dữ liệu ảnh. Bạn đã mở "Chia sẻ công khai" cho Album này chưa?');
          }

          const todayString = new Date().toISOString().split('T')[0];
          const newPhotos = uniqueUrls.map((rawUrl, i) => {
            return {
              id: `gphotos_${Date.now()}_${i}`,
              url: `${rawUrl}=w1200`,
              caption: `Kỷ niệm từ Album Photos #${i + 1}`,
              date: todayString,
              category: targetCategory
            };
          });

          // Lưu lên đám mây hoặc local
          if (firebaseEnabled && user) {
            for (const p of newPhotos) {
              const { id, ...rest } = p;
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id), rest);
            }
          } else {
            const combined = [...newPhotos, ...photos];
            setPhotos(combined);
            localStorage.setItem('family_photos', JSON.stringify(combined));
          }

          setScrapeSuccess(`Đã tải thành công ${newPhotos.length} ảnh trực tiếp lên trang web!`);
          setInputAlbumUrl('');
        } catch (err) {
          setScrapeError(err.message || 'Lỗi xử lý Album.');
        } finally {
          setIsScraping(false);
          setCurrentProxyStatus('');
        }
      };

          {/* --- MODAL PIN BẢO MẬT --- */}
          {showPinModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-amber-100 text-center space-y-4">
                <div className="w-12 h-12 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center mx-auto text-xl">
                  🔑
                </div>
                <div>
                  <h3 className="text-lg font-bold text-amber-950">Xác Thực Quản Trị Viên</h3>
                  <p className="text-xs text-slate-500 mt-1 font-sans">Vui lòng nhập mã PIN để vào phần cấu hình album gia đình.</p>
                </div>
                <form onSubmit={handleVerifyPin} className="space-y-3">
                  <input 
                    type="password" 
                    value={pinInput}
                    onChange={(e) => setPinInput(e.target.value)}
                    placeholder="Nhập mã PIN (Mặc định: 1234)"
                    className="w-full border border-slate-200 rounded-xl px-3 py-2 text-center text-sm font-mono tracking-widest focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none"
                    autoFocus
                  />
                  {pinError && (
                    <p className="text-[11px] text-rose-600 font-semibold font-sans">{pinError}</p>
                  )}
                  <div className="flex space-x-2 pt-2 font-sans">
                    <button 
                      type="button"
                      onClick={() => { setShowPinModal(false); setPinInput(''); setPinError(''); }}
                      className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-all"
                    >
                      Hủy bỏ
                    </button>
                    <button 
                      type="submit"
                      className="flex-1 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-amber-800/10"
                    >
                      Xác nhận
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* --- CÀI ĐẶT DRAWER --- */}
          {showSettings && (
            <div className="fixed inset-0 z-50 flex justify-end bg-black/50 backdrop-blur-xs transition-opacity">
              <div className="absolute inset-0" onClick={() => setShowSettings(false)}></div>

              <div className="relative w-full max-w-2xl bg-white h-full shadow-2xl flex flex-col z-10 transition-transform transform duration-300">
                <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-amber-50/50">
                  <div className="flex items-center space-x-2 text-amber-900">
                    <SettingsIcon className="w-5 h-5" />
                    <h2 className="text-lg font-bold font-serif">Tùy Biến Giao Diện Album</h2>
                  </div>
                  <button 
                    onClick={() => setShowSettings(false)}
                    className="p-1.5 hover:bg-amber-100 text-slate-500 hover:text-slate-800 rounded-full transition-colors"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <div className="flex border-b border-slate-100 text-sm overflow-x-auto whitespace-nowrap bg-slate-50">
                  <button 
                    onClick={() => setActiveTab('general')}
                    className={`flex-1 py-3 px-4 font-semibold text-center border-b-2 transition-colors ${activeTab === 'general' ? 'border-amber-700 text-amber-800 bg-white' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                  >
                    Thông tin chung
                  </button>
                  <button 
                    onClick={() => setActiveTab('members')}
                    className={`flex-1 py-3 px-4 font-semibold text-center border-b-2 transition-colors ${activeTab === 'members' ? 'border-amber-700 text-amber-800 bg-white' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                  >
                    Thành viên ({members.length})
                  </button>
                  <button 
                    onClick={() => setActiveTab('photos')}
                    className={`flex-1 py-3 px-4 font-semibold text-center border-b-2 transition-colors ${activeTab === 'photos' ? 'border-amber-700 text-amber-800 bg-white' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                  >
                    Quản lý ảnh ({photos.length})
                  </button>
                  <button 
                    onClick={() => setActiveTab('timeline')}
                    className={`flex-1 py-3 px-4 font-semibold text-center border-b-2 transition-colors ${activeTab === 'timeline' ? 'border-amber-700 text-amber-800 bg-white' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                  >
                    Cột mốc ({timeline.length})
                  </button>
                </div>

                <div className="flex-grow p-6 overflow-y-auto space-y-6">
                  {activeTab === 'general' && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Tên Album / Gia đình</label>
                        <input 
                          type="text" 
                          value={tempTitle}
                          onChange={(e) => setTempAlbumTitle(e.target.value)}
                          className="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Lời tựa ngắn / Châm ngôn</label>
                        <textarea 
                          value={tempSubtitle}
                          onChange={(e) => setTempAlbumSubtitle(e.target.value)}
                          rows={3}
                          className="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none"
                        />
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Ngày kỷ niệm gia đình</label>
                          <input 
                            type="date" 
                            value={tempAnniversaryDate}
                            onChange={(e) => setTempAnniversaryDate(e.target.value)}
                            className="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none"
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-bold uppercase tracking-wider text-rose-500 mb-1.5">🔑 Mã PIN Quản Trị Mới</label>
                          <input 
                            type="text" 
                            value={tempAdminPin}
                            onChange={(e) => setTempAdminPin(e.target.value)}
                            className="w-full border border-rose-200 rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none font-mono"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Link nhạc nền (File .mp3 phát trực tiếp)</label>
                        <input 
                          type="text" 
                          value={tempMusicUrl}
                          onChange={(e) => setTempMusicUrl(e.target.value)}
                          className="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm font-mono text-xs focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 outline-none"
                        />
                      </div>

                      <div className="pt-4 border-t border-slate-100 flex justify-between">
                        <button 
                          onClick={handleResetData}
                          className="px-4 py-2 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-xl text-xs font-bold transition-all"
                        >
                          Đặt lại toàn bộ mẫu gốc
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab === 'members' && (
                    <div className="space-y-4">
                      <div className="flex justify-between items-center">
                        <h3 className="text-sm font-bold text-amber-900">Danh sách thành viên</h3>
                        <button 
                          onClick={handleAddMember}
                          className="flex items-center space-x-1 px-3 py-1.5 bg-amber-800 text-white hover:bg-amber-900 rounded-lg text-xs font-semibold transition-all"
                        >
                          <PlusIcon className="w-4 h-4" />
                          <span>Thêm người</span>
                        </button>
                      </div>

                      <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-1">
                        {members.map((member) => (
                          <div key={member.id} className="p-4 border border-slate-100 rounded-2xl bg-slate-50 space-y-3 relative group/item">
                            <button 
                              onClick={() => handleDeleteMember(member.id)}
                              className="absolute top-4 right-4 text-slate-400 hover:text-rose-600 p-1 rounded-full hover:bg-rose-50 transition-all"
                            >
                              <TrashIcon className="w-4 h-4" />
                            </button>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Tên thành viên</label>
                                <input 
                                  type="text" 
                                  value={member.name}
                                  onChange={(e) => handleUpdateMember(member.id, 'name', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs outline-none mt-1"
                                />
                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Vai trò</label>
                                <input 
                                  type="text" 
                                  value={member.role}
                                  onChange={(e) => handleUpdateMember(member.id, 'role', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs outline-none mt-1"
                                />
                              </div>
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase">Link ảnh đại diện</label>
                              <input 
                                type="text" 
                                value={member.avatar}
                                onChange={(e) => handleUpdateMember(member.id, 'avatar', e.target.value)}
                                className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs outline-none mt-1 font-mono"
                              />
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase">Lời giới thiệu</label>
                              <input 
                                type="text" 
                                value={member.bio}
                                onChange={(e) => handleUpdateMember(member.id, 'bio', e.target.value)}
                                className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs outline-none mt-1"
                              />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'photos' && (
                    <div className="space-y-5">
                      <div className="p-5 bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-200/50 rounded-2xl space-y-3">
                        <div className="flex items-center space-x-2">
                          <span className="text-xl">⚡</span>
                          <h4 className="text-sm font-bold text-amber-950">Đồng bộ Album Google Photos trực tuyến</h4>
                        </div>
                        
                        <div className="space-y-3 pt-1">
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                            <div className="md:col-span-2">
                              <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Link album Google Photos</label>
                              <input 
                                type="text" 
                                value={inputAlbumUrl}
                                onChange={(e) => setInputAlbumUrl(e.target.value)}
                                placeholder="https://photos.app.goo.gl/..."
                                className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-2 text-xs outline-none focus:border-amber-500 font-mono"
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Chuyên mục ảnh</label>
                              <select 
                                value={importCategory}
                                onChange={(e) => setImportCategory(e.target.value)}
                                className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-2 text-xs outline-none focus:border-amber-500"
                              >
                                {CATEGORIES.filter(c => c !== 'Tất cả').map((cat) => (
                                  <option key={cat} value={cat}>{cat}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          <button
                            onClick={() => handleImportAlbum(inputAlbumUrl, importCategory)}
                            disabled={isScraping || !inputAlbumUrl.trim()}
                            className={`w-full py-2.5 rounded-xl text-xs font-bold text-white transition-all flex items-center justify-center space-x-2 ${
                              isScraping || !inputAlbumUrl.trim() 
                                ? 'bg-slate-300 cursor-not-allowed' 
                                : 'bg-amber-800 hover:bg-amber-900 shadow-md shadow-amber-800/10'
                            }`}
                          >
                            {isScraping ? <span>Đang đồng bộ...</span> : <span>📥 Đồng bộ hóa toàn bộ ảnh ngay</span>}
                          </button>

                          {isScraping && currentProxyStatus && (
                            <p className="text-[11px] text-amber-700 italic animate-pulse">⏳ {currentProxyStatus}</p>
                          )}

                          {scrapeError && (
                            <div className="text-xs text-rose-600 font-semibold bg-rose-50 p-3 rounded-xl border border-rose-100">
                              ⚠️ {scrapeError}
                            </div>
                          )}

                          {scrapeSuccess && (
                            <div className="text-xs text-emerald-700 font-semibold bg-emerald-50 p-3 rounded-xl border border-emerald-100 flex items-center justify-between">
                              <span>🎉 {scrapeSuccess}</span>
                              <button onClick={() => setScrapeSuccess('')} className="font-bold text-sm">×</button>
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="flex justify-between items-center">
                        <h3 className="text-sm font-bold text-amber-900">Danh sách ảnh hiện tại ({photos.length})</h3>
                        <button 
                          onClick={handleAddPhoto}
                          className="flex items-center space-x-1 px-3 py-1.5 bg-amber-800 text-white hover:bg-amber-900 rounded-lg text-xs font-semibold transition-all"
                        >
                          <PlusIcon className="w-4 h-4" />
                          <span>Thêm từng ảnh thủ công</span>
                        </button>
                      </div>

                      <div className="space-y-4 max-h-[38vh] overflow-y-auto pr-1">
                        {photos.map((photo) => (
                          <div key={photo.id} className="p-4 border border-slate-100 rounded-2xl bg-slate-50 space-y-3 relative flex flex-col md:flex-row gap-4">
                            <div className="w-full md:w-28 h-20 rounded-lg overflow-hidden bg-slate-200 border border-slate-100 shrink-0 self-center">
                              <img src={photo.url} alt={photo.caption} className="w-full h-full object-cover" />
                            </div>

                            <div className="flex-grow space-y-2.5">
                              <div className="grid grid-cols-2 gap-2">
                                <div>
                                  <label className="block text-[10px] font-bold text-slate-400 uppercase">Ngày chụp</label>
                                  <input 
                                    type="date" 
                                    value={photo.date}
                                    onChange={(e) => handleUpdatePhoto(photo.id, 'date', e.target.value)}
                                    className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs"
                                  />
                                </div>
                                <div>
                                  <label className="block text-[10px] font-bold text-slate-400 uppercase">Chuyên mục</label>
                                  <select 
                                    value={photo.category}
                                    onChange={(e) => handleUpdatePhoto(photo.id, 'category', e.target.value)}
                                    className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs"
                                  >
                                    {CATEGORIES.filter(c => c !== 'Tất cả').map((cat) => (
                                      <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                  </select>
                                </div>
                              </div>

                              <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Link địa chỉ ảnh (URL)</label>
                                <input 
                                  type="text" 
                                  value={photo.url}
                                  onChange={(e) => handleUpdatePhoto(photo.id, 'url', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs font-mono"
                                />
                              </div>

                              <div>
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Chú thích</label>
                                <input 
                                  type="text" 
                                  value={photo.caption}
                                  onChange={(e) => handleUpdatePhoto(photo.id, 'caption', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs"
                                />
                              </div>
                            </div>

                            <button onClick={() => handleDeletePhoto(photo.id)} className="absolute top-2 right-2 text-slate-400 hover:text-rose-600">
                              <TrashIcon className="w-4 h-4" />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'timeline' && (
                    <div className="space-y-4">
                      <div className="flex justify-between items-center">
                        <h3 className="text-sm font-bold text-amber-900">Nhật ký hành trình</h3>
                        <button 
                          onClick={handleAddTimeline}
                          className="flex items-center space-x-1 px-3 py-1.5 bg-amber-800 text-white hover:bg-amber-900 rounded-lg text-xs font-semibold transition-all"
                        >
                          <PlusIcon className="w-4 h-4" />
                          <span>Thêm mốc</span>
                        </button>
                      </div>

                      <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-1">
                        {timeline.map((event) => (
                          <div key={event.id} className="p-4 border border-slate-100 rounded-2xl bg-slate-50 space-y-3 relative">
                            <button onClick={() => handleDeleteTimeline(event.id)} className="absolute top-4 right-4 text-slate-400 hover:text-rose-600">
                              <TrashIcon className="w-4 h-4" />
                            </button>

                            <div className="grid grid-cols-3 gap-2">
                              <div className="col-span-1">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Năm</label>
                                <input 
                                  type="text" 
                                  value={event.year}
                                  onChange={(e) => handleUpdateTimeline(event.id, 'year', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs mt-1"
                                />
                              </div>
                              <div className="col-span-2">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase">Tên sự kiện</label>
                                <input 
                                  type="text" 
                                  value={event.title}
                                  onChange={(e) => handleUpdateTimeline(event.id, 'title', e.target.value)}
                                  className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs mt-1"
                                />
                              </div>
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase">Câu chuyện</label>
                              <textarea 
                                value={event.desc}
                                onChange={(e) => handleUpdateTimeline(event.id, 'desc', e.target.value)}
                                rows={2}
                                className="w-full border border-slate-200 bg-white rounded-lg px-2.5 py-1.5 text-xs mt-1"
                              />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                  <button 
                    onClick={handleSaveAllAndClose}
                    className="px-5 py-2 bg-amber-800 hover:bg-amber-900 text-white rounded-xl text-sm font-bold"
                  >
                    Hoàn tất & Lưu lại
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
